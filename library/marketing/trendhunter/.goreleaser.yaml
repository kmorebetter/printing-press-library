version: 2
project_name: trendhunter-pp-cli
changelog:
  disable: true
builds:
  - id: trendhunter-pp-cli
    main: ./cmd/trendhunter-pp-cli
    binary: trendhunter-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/trendhunter/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: trendhunter-pp-mcp
    main: ./cmd/trendhunter-pp-mcp
    binary: trendhunter-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: trendhunter-pp-cli
    repository:
      owner: mvanhorn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Trend Hunter feature, plus a local SQLite corpus, FTS5 search, FAQ Q&A extraction, and agent-native JSON no..."
    install: |
      bin.install "trendhunter-pp-cli"
      bin.install "trendhunter-pp-mcp"

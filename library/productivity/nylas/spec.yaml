  securitySchemes:
    ACCESS_TOKEN:
      scheme: bearer
      type: http
      bearerFormat: NYLAS_ACCESS_TOKEN
      description: |-
        The Nylas **access token** for a specific grant. Issued as part of OAuth 2.1 flow token
        exchange.
    NYLAS_API_KEY:
      scheme: bearer
      type: http
      bearerFormat: NYLAS_API_KEY
      description: |-
        The Nylas **API key** provides application-level access to APIs and all grants. You can
        generate these from the Dashboard. Learn more about [authorizing requests](/docs/v3/auth/).
    SCHEDULER_SESSION_TOKEN:
      scheme: bearer
      type: http
      bearerFormat: Session ID
      description: The Nylas Scheduler **session ID** that Scheduler UI Components use to authorize API requests.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              request_id:
                type: string
                description: ID of the request.
          examples:
            OK:
              value:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
    '202':
      description: Email Send Accepted
      content:
        application/json:
          schema:
            type: object
            required:
              - grant_id
              - data
              - request_id
              - schedule_id
            properties:
              grant_id:
                type: string
              request_id:
                type: string
              data:
                $ref: '#/components/schemas/message_send_response'
          examples:
            example1:
              description: Save a scheduled message with an Attachment as a draft
              value:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
                schedule_id: 17d0281e-0c25-4ad1-a275-639c74f5f6a4
                send_at: 1671234087
                use_draft: true
                grant_id: your grant_id
                data:
                  subject: Sending Emails with Nylas
                  body: Nylas API v3 Test!
                  from:
                    - name: John Doe
                      email: johnn.doe@example.com
                  to:
                    - name: Jane Doe
                      email: jane.doe@example.com
                  cc:
                    - name: Nylas
                      email: nylas@example.com
                  bcc:
                    - name: Nylas
                      email: nylas@example.com
                  attachments:
                    - content_id: HASKDJhiuahsdjlkhKJAsd=
                      content_type: text/plain
                      content_disposition: inline
                      filename: myfile.txt
            example2:
              description: Send a scheduled message with many recipients
              value:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
                schedule_id: 17d0281e-0c25-4ad1-a275-639c74f5f6a4
                send_at: 1671234087
                use_draft: false
                grant_id: your grant_id
                data:
                  subject: Sending Emails with Nylas
                  body: Nylas API v3 Test!
                  from:
                    - name: John Doe
                      email: johnn.doe@example.com
                  to:
                    - name: Jane Doe
                      email: jane.doe@example.com
                    - name: Scott
                      email: scott@example.com
                    - name: Tom
                      email: tom@example.com
                  attachments:
                    - content_id: HASKDJhiuahsdjlkhKJAsd=
                      content_type: text/plain
                      filename: myfile.txt
                      content_disposition: attachment
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            title: error
            type: object
            properties:
              request_id:
                type: string
                description: The request ID.
              error:
                type: object
                description: The response error object.
                properties:
                  type:
                    type: string
                    description: The error type.
                  message:
                    type: string
                    description: The error message.
                  provider_error:
                    type: object
                    description: The error from the provider.
          examples:
            Bad Request:
              value:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
                error:
                  type: invalid_request_error
                  message: error parsing request body
                  provider_error:
                    code: TargetIdShouldNotBeMeOrWhitespace
                    message: Id is malformed.
            Invalid Idempotency-Key:
              value:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88

  /v3/migration-tools/link-v2v3-apps:
    post:
      operationId: migration_link_v2v3_apps
      tags:
        - App migration
      summary: Link a v2 app to a v3 app
      description: |-
        Link an existing v2 application to an existing v3 application.

        <div id="admonition-warning">⚠️<strong>Your v2 and v3 applications must be in the same data center region to use these tools. </strong> You can only use these tools to migrate a v2 application to a v3 application in the same region. You cannot use these to move a v2 application to a different region.</div>

        This is the first step of the migration process, and is how you tell Nylas which v2 application you are migrating.

        To use this API you need the v2 source application ID and secret, in the format you use to authorize v2 API calls, and the v3 API key from the v3 destination application.

        To verify that you own the v2 source application you're linking, add the `BasicV2` API header. This extra header is required. The `BasicV2` API header contains a Base64-encoded `V2_APP_ID:V2_APP_SECRET`, which is also used for Basic auth for any v2 API call.

        ```bash
        --header 'BasicV2: <base64-encoded V2_APP_ID:V2_APP_SECRET> // Use the -n flag when you Base64 encode
        ```

        No further request body is required. Nylas detects the v3 application ID from the API key, and the v2 application ID from the BasicV2 header.

        The API is rate limited to 20 requests per second per Nylas application ID.
      security:
        - NYLAS_API_KEY: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/ApplicationObject'
          description: On success, returns the existing v3 application object with added linked v2 application ID.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/migration-tools/link-v2v3-apps' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --header 'BasicV2: <base64-encoded V2_APP_ID:V2_APP_SECRET>'
  /v3/migration-tools/import-v2-app:
    post:
      operationId: migration_import_v2_app
      tags:
        - App migration
      summary: Import v2 app settings to linked v3 app
      description: |-
        Import the settings from a v2 Nylas application to its linked v3 application. Before you use this
        endpoint, make sure you
        [link a v2 application to a v3 application](/docs/reference/api/app-migration/migration_link_v2v3_apps/).

        This endpoint imports the following v2 settings, and sets them to the corresponding v3 application
        settings:

          - Your website URL.
          - Your icon URL (used to customize the Hosted OAuth page).
          - Redirect URIs for OAuth.
          - Integrations and their settings.
            - Nylas migrates Google integrations to equivalent v3 connectors.
            - If you have v2 Microsoft integrations, you should create a new Azure auth app and update the
            connector settings. For detailed instructions, see
            [Migrating Microsoft accounts](/docs/v2/upgrade-to-v3/upgrade/migrating-microsoft-accounts/).
            - Nylas migrates IMAP, iCloud, and EWS integrations to v3 connectors with auto-generated default
            values.

        Nylas automatically detects your application ID from the API key and finds its linked v2
        application to begin the import process.

        This endpoint is rate limited to 20 requests per second, per Nylas application ID.
      security:
        - NYLAS_API_KEY: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    type: string
                    description: Info message about success.
                    example: 'V2 Application imported successfully to v3 Application: app settings, Connectors, redirect URIs, etc.'
          description: Immedieately returns a list of two Jobs, Snapshot and BatchClone. Those Jobs continue to synchronously run in the background.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/migration-tools/import-v2-app' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
  /v3/migration-tools/grants/{account_id}/clone:
    post:
      operationId: migration_clone_single_account
      tags:
        - App migration
      summary: Migrate v2 account to v3 grant
      description: |-
        Migrates a single v2 connected account to a v3 grant. Use this endpoint to migrate a few accounts
        to v3 as a test, then use the
        [Batch Clone endpoint](/docs/reference/api/app-migration/migration_snapshot_batch_clone/)
        to migrate the rest.

        Before you use this endpoint, your v2 Nylas applications need to be linked to their corresponding v3
        applications and you need to have a working equivalent
        [authentication connector](/docs/reference/api/connectors-integrations/) for each provider
        you use. If you need help with this process, [learn how to get support](/docs/support/).

        During migration, Nylas maps the v2 provider to its v3 equivalent using the connected account's
        v2 authorization type and provider. All sensitive data (such as tokens and passwords) is encrypted
        and securely transfered only within the Nylas infrastructure. No secrets exit the internal Nylas
        network.

        This endpoint is rate limited to 20 requests per second, per Nylas application ID.

        ### Create placeholder grants

        Nylas can migrate existing Microsoft Graph, Office 365, and EWS accounts that use token
        authentication. It can't fully migrate
        [some types of Microsoft accounts](/docs/v2/upgrade-to-v3/upgrade/migrating-microsoft-accounts/#microsoft-account-import-compatibility-in-v3)
        because of provider limitations and scope changes in v3.

        By default, Nylas creates an invalid v3 Grant with fake credentials for accounts that it can't
        automatically migrate. These grants act as "placeholders" that the user can manually authenticate
        to later. You can turn this feature off for Microsoft accounts only by setting the `clone_exchange`
        query parameter to `false`, or for all providers by setting `allow_invalid_grant_creation` to
        `false`.
      security:
        - NYLAS_API_KEY: []
      parameters:
        - $ref: '#/components/parameters/account_id'
        - name: allow_invalid_grant_creation
          in: query
          required: false
          description: |-
            (Not supported for Microsoft) When `true`, Nylas creates invalid v3 grants with fake credentials
            for all connected accounts in your request. These grants act as placeholders that users can
            authenticate to later.
          schema:
            type: boolean
            default: true
        - name: clone_exchange
          in: query
          required: false
          description: |-
            (Microsoft only) When `true`, Nylas creates invalid v3 grants with fake credentials for any
            Microsoft accounts that can't be automatically migrated. These grants act as placeholders that
            users can authenticate to later.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/GrantObject'
          description: On success, returns the v3 Grant object Nylas created as part of the migration.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/migration-tools/grants/<account_id>/clone' \
              --header 'Content-Type: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
  /v3/migration-tools/snapshot-batch-clone:
    post:
      operationId: migration_snapshot_batch_clone
      tags:
        - App migration
      summary: Batch clone v2 accounts to v3 grants
      description: |-
        Starts a batch migration job to clone v2 connected accounts to v3 grants.

        Before you use this endpoint, your v2 Nylas applications need to be linked to their corresponding v3
        applications and you need to have a working equivalent 
        [authentication connector](/docs/reference/api/connectors-integrations/) for each provider
        you use. If you need help with this process, [learn how to get support](/docs/support/).

        When you make a batch clone request, Nylas starts two background jobs:

          - A snapshot job that prepares non-sensitive v2 account data for migration.
          - A batch clone job that migrates the v2 account data to v3 grants.

        Nylas handles all data and logic for these jobs and runs them in the background to they don't block
        API responses.

        You can filter for certain types of accounts by specifying properties in the body of your request.
        Use these options when you want to try migrating certain types of accounts in smaller batches,
        or to retry failed migrations. If you don't specify any filters, Nylas uses the default values.

        During migration, Nylas maps the v2 provider to its v3 equivalent using the connected account's
        v2 authorization type and provider. All sensitive data (such as tokens and passwords) is encrypted
        and securely transfered only within the Nylas infrastructure. No secrets exit the internal Nylas
        network.

        This endpoint is rate limited to 20 requests per second, per Nylas application ID.

        ### Create placeholder grants

        Nylas can migrate existing Microsoft Graph, Office 365, and EWS accounts that use token
        authentication. It can't fully migrate
        [some types of Microsoft accounts](/docs/v2/upgrade-to-v3/upgrade/migrating-microsoft-accounts/#microsoft-account-import-compatibility-in-v3)
        because of provider limitations and scope changes in v3.

        By default, Nylas creates an invalid v3 Grant with fake credentials for accounts that it can't
        automatically migrate. These grants act as "placeholders" that the user can manually authenticate
        to later. You can turn this feature off for Microsoft accounts only by setting the `clone_exchange`
        query parameter to `false`, or for all providers by setting `allow_invalid_grant_creation` to
        `false`.
      parameters:
        - name: allow_invalid_grant_creation
          in: query
          required: false
          description: |-
            (Not supported for Microsoft) When `true`, Nylas creates invalid v3 grants with fake credentials
            for all connected accounts in your request. These grants act as placeholders that users can
            authenticate to later.
          schema:
            type: boolean
            default: true
        - name: clone_exchange
          in: query
          required: false
          description: |-
            (Microsoft only) When `true`, Nylas creates invalid v3 grants with fake credentials for any
            Microsoft accounts that can't be automatically migrated. These grants act as placeholders that
            users can authenticate to later.
          schema:
            type: boolean
            default: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  default: 1000
                  description: Number of accounts to migrate. Nylas orders the migration records created by the snapshot job, by `imported_at` timestamp from oldest to newest.
                  example: 10
                offset:
                  type: integer
                  default: 0
                  description: Number of accounts to skip. Nylas orders the migration records created by the snapshot job, by `imported_at` timestamp from oldest to newest.
                  example: 0
                providers:
                  type: array
                  items:
                    type: string
                    default: If none specified, Nylas migrates all supported providers
                    enum:
                      - google
                      - microsoft
                      - graph
                      - imap
                      - icloud
                      - ews
                      - virtual-calendar
                  description: Use this setting to limit the migration job to a specific provider or providers, so you can migrate one type at a time.
                  example:
                    - google
                    - microsoft
                mode:
                  type: string
                  default: all
                  enum:
                    - all
                    - only_new
                    - only_failed
                  description: 'Use this setting to limit the migration job to accounts that have specific statuses, or when retrying failed migrations. - ''all'': No filtering, migrate all accounts that meet the request criteria. - ''only_new'': Migrate only accounts that haven''t attempted migration. - ''only_failed'': Migrate only accounts that attempted migration previously and were marked as failed.'
                  example: all
      security:
        - NYLAS_API_KEY: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    type: object
                    properties:
                      clone_job:
                        $ref: '#/components/schemas/MigrationJob'
                      snapshot_job:
                        $ref: '#/components/schemas/MigrationJob'
          description: Immediately returns a list of the two jobs for the migration run:, snapshot and batch clone. Those jobs continue to synchronously run in the background.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/migration-tools/snapshot-batch-clone' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --header 'Content-Type: application/json' \
              --data '{
                "limit": 100,
                "providers": [
                  "google",
                  "imap",
                  "graph",
                  "ews",
                  "icloud"
                ],
                "mode": "all",
                "clone_exchange": false
              }'
  /v3/migration-tools/jobs:
    get:
      operationId: migration_get_jobs
      tags:
        - App migration
      summary: Get migration jobs
      description: |-
        Get information about the migration jobs for your application, including progress and status, for currently running and finished jobs.

        Migration Jobs are a background task. After you start one Nylas returns a success response, and the jobs run in the background until they finish. These jobs do not block other API calls, but also do not send a notification when complete. This API allows you to get general information about a them, so you can see their status. 

        There are two types of migration job: "snapshot" and "migration". A Snapshot job takes a snapshot of the application's v2 account data, and prepares it for migration. A Migration job actually turns the v2 account data into v3 grants.

        Jobs have a status, which can be one of the following:
        - A _pending_ job is queued and waiting to start.
        - A _running_ job is currently in progress.
        - A _partial_ job has finished, but was not able to migrate all accounts successfully.
        - A _completed_ job has finished and successfully migrated _all_ accounts.
        - A _failed_ job has finished but did not migrate any accounts.

        You can optionally filter the list of jobs to return only jobs with a specific status or type.

        You can also use the `sort_by_completion` argument to return the list of jobs with pending and running jobs first, followed by failed, completed, and partial jobs. Finished jobs are ordered by their completion timestamp (`CompletedAt`) from the most recent to the oldest.

        If you don't include any query parameters to filter the results, Nylas returns all jobs.

        The API is rate limited to 20 requests per second per Nylas application ID.
      parameters:
        - name: status
          in: query
          required: false
          description: |-
            Filter for jobs by status:

              - `completed`: The job finished and all accounts were migrated successfully.
              - `failed`: The job finished, but no accounts were migrated.
              - `partial`: The job finished. Some accounts were migrated successfully, and some failed.
              - `pending`: The job is queued.
              - `running`: The job is running.
          schema:
            type: array
            items:
              type: string
              enum:
                - completed
                - failed
                - partial
                - pending
                - running
            example: running,completed
        - name: type
          in: query
          required: false
          description: Filter for jobs by type.
          schema:
            type: array
            items:
              type: string
              enum:
                - migration
                - snapshot
            example: migration
        - name: sort_by_completion
          in: query
          required: false
          description: |-
            When `true`, Nylas sorts the jobs it returns in the following order:

              1. Jobs with `pending` status.
              2. Jobs with `running` status.
              3. Jobs with all other statuses, from most to least recent `CompletedAt` time.
          schema:
            type: boolean
      security:
        - NYLAS_API_KEY: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MigrationJob'
          description: Returns a list of jobs.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request GET \
              --url 'https://api.us.nylas.com/v3/migration-tools/jobs?status=pending%2Crunning%2Cfailed%2Ccompleted&type=snapshot%2Cmigration&sort_by_completion=true' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --header 'Content-Type: application/json'
  /v3/migration-tools/translate:
    post:
      operationId: translate_v2id_to_provider_id
      tags:
        - Data migration
      summary: Translate v2 Nylas ID into v3 Provider ID
      description: |-
        Use the connected account ID and a resource type, with an optional list of specific Nylas IDs, to get a response that contains a list of of Nylas IDs and their v3 Provider ID equivalents. Use this API as a one-time operation to translate v2 IDs into v3 Provider IDs. Do not use this API in your code logic as it very data intensive.

        To use this endpoint, your v2 Nylas application needs to be linked to the equivalent v3 Nylas application. This endpoint does not work for objects in v2 accounts that have the provider set to `Outlook`.

        By default, the API returns up to 3000 records for the requested resource type related to the v2 connected account, sorted by `created_at` date. If you specify a list of v2 Nylas IDs, the API returns the v3 Provider IDs for those specific IDs only.

        Results are paginated, with a page size of 3000 results. If the response includes a `next_page_number` field, you can use that number in a request to get the next set of results. 

        Also, there is a possibility to search results created only after certain Unix timestamp, in Nylas v2 database. To use this, add to body payload `start_from_timestamp` valid Unix timestamp.

        The API is rate limited to 20 requests per second per Nylas application ID.

        ### IMAP folder resource ID

        When you make a Translate ID request for an IMAP folder (`resource_type: folders`), Nylas returns its name in the `v3_resource_id` field. To get the resource ID for a specific folder, Base64 encode the folder name using the following format: `v0:<NYLAS_GRANT_ID>:<FOLDER_NAME>`.
      security:
        - NYLAS_API_KEY: []
      requestBody:
        required: true
        description: ''
        content:
          application/json:
            schema:
              type: object
              required:
                - resource_type
                - v2_account_id
              properties:
                resource_type:
                  example: messages
                  type: string
                  description: The resourece(s) to get translations for.
                  enum:
                    - messages
                    - drafts
                    - threads
                    - contacts
                    - contactgroups
                    - events
                    - calendars
                    - folders
                v2_account_id:
                  example: 1kb392012l0mr39hmla2exnxu
                  type: string
                  description: The v2 connected account ID to get translations for.
                nylas_ids:
                  type: array
                  description: (Optional) The list of v2 IDs to translate. If omitted, Nylas returns up to 3000 IDs for the requested resource types related to that v2 connected account. Results are returned sorted by creation date, ascending.
                  items:
                    type: string
                  example:
                    - 4ro91k0t3ofvzs3b3lij6iqa2
                    - 5ro92l1t4pfwzt4c4mijk7jb3
                    - 6ro93m2u5qgxzu5d5nijl8kc4
                start_from_timestamp:
                  example: 1727172308
                  type: integer
                  description: (Optional) The Unix timestamp to search for results created after that timestamp.
                next_page_number:
                  example: 2
                  type: integer
                  description: (Optional) The page number for the next set of results. This appears in the response only if there are more results available.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/translate_v2v3_id'
          description: Returns a JSON list of translated objects, with mapped v2 and translated v3 ids.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/migration-tools/translate' \
              --header 'Content-Type: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --data '{
                "resource_type": "messages",
                "v2_account_id": "<NYLAS_ACCOUNT_ID>",
                "nylas_ids": [
                  "<NYLAS_ACCOUNT_ID>",
                  "<NYLAS_ACCOUNT_ID>"
                ]
              }'
components:
  schemas:
    '400':
      type: object
      required:
        - request_id
        - error
      additionalProperties: false
      properties:
        request_id:
          description: ID of the request
          type: string
          example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
        error:
          description: Error object
          type: object
          properties:
            type:
              type: string
              description: Type of error
              example: bad_request
            message:
              description: Informative error message
              default: Bad request
              type: string
              example: Bad request
            provider_error:
              description: (OPTIONAL) informative error message from provider's side
              type: object
              example:
                error: invalid_grant
                provider_error: Bad Request
    '401':
      type: object
      required:
        - request_id
        - error
      additionalProperties: false
      properties:
        request_id:
          description: ID of the request
          type: string
          example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
        error:
          description: Error object
          type: object
          properties:
            type:
              type: string
              description: Type of error
              example: invalid_request_error
            message:
              description: Informative error message
              default: Authentication error
              type: string
              example: Authentication error
            provider_error:
              description: (OPTIONAL) informative error message from provider's side
              type: object
              example:
                error: invalid_grant
                provider_error: Bad Request
    '404':
      type: object
      required:
        - request_id
        - error
      additionalProperties: false
      properties:
        request_id:
          description: ID of the request
          type: string
          example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
        error:
          description: Error object
          type: object
          properties:
            type:
              type: string
              description: Type of error
              example: xyz.not_found_error
            message:
              description: Informative error message
              default: Resource not found
              type: string
              example: Resource not found
            provider_error:
              description: (OPTIONAL) informative error message from provider's side
              type: object
              example:
                error: invalid_grant
                provider_error: Bad Request
    webDesktopCallbackNoSettings:
      title: Web or Desktop
      properties:
        platform:
          type: string
          description: Platform identifier
          enum:
            - web
            - desktop
        id:
          type: string
          description: The callback URI ID. This must be a universally unique ID (UUID).
          example: 0556d035-6cb6-4262-a035-6b77e11cf8fc
        url:
          type: string
          description: |-
            Your project's callback URI, including the protocol. Nylas accepts HTTP for localhost development
            _only_. Otherwise, you need to use HTTPS.
          example: https://yourapp.com/callback
    JsCallbackwSettings:
      title: JS
      properties:
        platform:
          type: string
          description: Platform identifier
          enum:
            - js
        id:
          type: string
          description: The callback URI ID. This must be a universally unique ID (UUID).
          example: 0556d035-6cb6-4262-a035-6b77e11cf8fc
        url:
          type: string
          description: |-
            Your project's callback URI, including the protocol. Nylas accepts HTTP for localhost development _only_.
            Otherwise, you must use HTTPS.
          example: https://yourapp.com/callback
        settings:
          description: Additional platform settings and configurations for the Javascript callback URI.
          type: object
          required:
            - origin
          properties:
            origin:
              type: string
              description: The `origin` is the base URL from which your project or app is served. It is required because it's a critical part of defining your app's trust boundaries to prevent cross-origin issues. Set this when you set up OAuth redirect URIs and other security settings.
              example: yourapp.com
    iosCallbackwSettings:
      title: iOS
      properties:
        platform:
          type: string
          description: Platform identifier
          enum:
            - ios
        id:
          type: string
          description: The callback URI ID. This must be a universally unique ID (UUID).
          example: 0556d035-6cb6-4262-a035-6b77e11cf8fc
        url:
          type: string
          description: |-
            Your project's callback URI. This can be HTTPS or a deeplink (for example,
            `<package/bundle-name>://<deeplink>`).

            Nylas accepts HTTP for localhost development _only_. Otherwise, you must use HTTPS.
          example: https://yourapp.com/callback
        settings:
          description: Additional platform settings and configurations for the iOS callback URI.
          type: object
          required:
            - bundle_id
          properties:
            bundle_id:
              type: string
              description: The `bundle_id` (Bundle Identifier) is a unique identifier for an iOS app. It's set in the Xcode project and follows a reverse domain name style.
              example: com.example.myapp
            app_store_id:
              type: string
              description: Unique identifier for your app on the Apple App Store. This ID is assigned to your app when you submit it to the App Store and it is approved.
              example: 1234567890
            team_id:
              type: string
              example: ABCDE12345
              description: Unique identifier for your Apple Developer Account or team.
    AndroidCallbackwSettings:
      title: Android
      properties:
        platform:
          type: string
          description: Platform identifier
          enum:
            - android
        id:
          type: string
          description: The callback URI ID. This must be a universally unique ID (UUID).
          example: 0556d035-6cb6-4262-a035-6b77e11cf8fc
        url:
          type: string
          description: |-
            Your project's callback URI. This can be HTTPS or a deeplink (for example,
            `<package/bundle-name>://<deeplink>`).

            Nylas accepts HTTP for localhost development _only_. Otherwise, you must use HTTPS.
          example: https://yourapp.com/callback
        settings:
          description: Additional platform settings and configurations for the Android callback URI.
          type: object
          required:
            - package_name
            - sha1_certificate_fingerprint
          properties:
            package_name:
              type: string
              description: Find your app's Package Name in the Android Manifest. It's a unique identifier that distinguishes your app on the Google Play Store and on the device. It follows a reverse domain name notation, such as `com.example.myapp`.
              example: com.example.myapp
            sha1_certificate_fingerprint:
              type: string
              description: A SHA-1 hash of the app's signing certificate. This ensures that only the _signed_ version of your app can use the redirect URI.
              example: AB:CD:EF:12:34:56:78:90:AB:CD:EF:12:34:56:78:90:AB:CD:EF:12
    ApplicationObject:

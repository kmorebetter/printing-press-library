              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            async function cancelStandaloneNotetaker() {
              try {
                const result = await nylas.notetakers.cancel({
                  notetakerId: "<NOTETAKER_ID>",

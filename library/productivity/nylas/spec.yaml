          description: The user's provider ID. This field might be changed at any time by the provider.
          example: b16f171c-6640-4edd-a598-e507b546d841
        scope:
          type: array
          items:
            type: string
          description: |-
            An array of [granular scopes](/docs/dev-guide/scopes/) associated with the grant. If none are
            specified, Nylas uses the default scopes from the
            [connector](/docs/reference/api/connectors-integrations/).
          example:
            - Mail.Read
            - User.Read
            - offline_access
        settings:
          type: object
          description: |-
            A list of settings associated with the grant. The contents of this object might differ between
            grants or depending on the provider.
        email_aliases:
          type: array
          items:
            type: string
          description: |-
            An array of found email aliases for this grant. Only returned if special query parameter `expose_aliases` for 
            [Get Grant](/docs/reference/api/manage-grants/get_grant_by_id/) is used and set to `true`.
            Applicable only for Google and Microsoft grants.
          example:
            - email_alias1@example.com
            - email_alias2@example.com
        state:
          type: string
          description: |-
            The initial state that was set as part of the authentication process. Nylas passes this value
            back to your project without modifying it. You can use this field for verification, or to track
            information about the user.
          example: my-state
        updated_at:
          type: integer
          description: |-
            When the user last authenticated their grant, in seconds using the Unix timestamp format.
            Initially, this value is the same as `created_at`.
          example: 1617817109
        user_agent:
          type: string
          description: |-
            The user's [client or browser information](https://www.useragents.me/). Mostly useful for
            [Hosted OAuth](/docs/v3/auth/hosted-oauth-apikey/).
        workspace_id:
          type: string
          description: The ID of the Workspace the grant belongs to.
          example: abf6ff99-05ad-4c0a-aaf8-400aacf2470a
        credential_id:
          type: string
          description: The ID of the Credential the grant is associated with. Grant will use this Credential for provider communication.
          example: c123f8e1a-eb1c-41c0-b6a6-d2e59daf7f47
    WorkspaceObject:
      type: object
      properties:
        application_id:
          type: string
          description: The ID of the application the workspace is associated with.
          example: ad410018-d306-43f9-8361-fa5d7b2172e0
        auto_group:
          type: boolean
          description: |-
            When `true`, specifies that newly created grants in the application are automatically assigned
            to the workspace if their email address' domain matches the `domain`.
          example: true
        created_at:
          type: integer
          description: When the workspace was created, in seconds using the Unix timestamp format.
          example: 1756379932
        domain:
          type: string
          description: The top-level domain associated with the workspace.
          example: nylas.com
        name:
          type: string
          description: The name of the workspace.
          example: The Nylas Workspace
        updated_at:
          type: integer
          description: |-
            When the workspace was last updated, in seconds using the Unix timestamp format. Initially, this
            value is the same as `created_at`.
          example: 1756379932
        workspace_id:
          type: string
          description: The workspace ID.
          example: abf6ff99-05ad-4c0a-aaf8-400aacf2470a
    200-delete:
      description: Delete Succeeded
      content:
        application/json:
          schema:
            type: object
            required:
              - request_id
            properties:
              request_id:
                type: string
                description: ID of the request.
                example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
    common_response:
      properties:
        request_id:
          type: string
          description: The request ID.

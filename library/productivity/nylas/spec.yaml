                name:
                  type: string
                  description: The credential name.
                  example: My first Google credential
                credential_data:
                  description: |-
                    An object that specifies some special information required for the credential.
                    This information is securely encoded and stored, and is _not_ visible to users.

                    For the
                    [Google App Permission flow](/docs/v3/auth/bulk-auth-grants/#google-app-permission-via-nylas),
                    this field must contain the `private_key_id`, `private_key`, and `client_email`.

                    For the
                    [Microsoft App Permission flow](/docs/v3/auth/bulk-auth-grants/#use-a-microsoft-bulk-authentication-grant),
                    this field must contain the Azure `client_id` and `client_secret`.

                    To use the credential to override a connector, this field must contain the `client_id`
                    and `client_secret`.
                  example:
                    type: service_account
                    project_id: marketplace-sa-test
                    private_key_id: abcd1234defg5678
                    private_key: |
                      -----BEGIN PRIVATE KEY-----
                      ...
                      -----END PRIVATE KEY-----
                    client_email: some-name@marketplace-sa-test.iam.gserviceaccount.com
                    client_id: '123456789'
                    auth_uri: https://accounts.google.com/o/oauth2/auth
                    token_uri: https://oauth2.googleapis.com/token
                    auth_provider_x509_cert_url: https://www.googleapis.com/oauth2/v1/certs
                    client_x509_cert_url: https://www.googleapis.com/robot/v1/metadata/x509/some-name%40marketplace-sa-test.iam.gserviceaccount.com
                  type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/CredentialObject'
          description: Returns the updated credential.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request PATCH \
              --url 'https://api.us.nylas.com/v3/connectors/<CONNECTOR>/creds/<CREDENTIAL_ID>' \
              --header 'Content-Type: application/json' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --data '{
                "name": "google",
                "credential_data": {
                  "client_id": "<PROVIDER_CLIENT_ID>",
                  "client_secret": "<PROVIDER_CLIENT_SECRET>"
                }
              }'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            const updated = await nylas.connectors.credentials.update({
              provider: "google",
              credentialsId: "<CREDENTIAL_ID>",
              requestBody: {
                name: "google",
                credentialData: {
                  client_id: "<PROVIDER_CLIENT_ID>",
                  client_secret: "<PROVIDER_CLIENT_SECRET>",
                },
              },
            });

            console.log("Credential updated:", updated);
        - lang: python
          label: Python SDK
          source: |
            from nylas import Client

            nylas = Client(
                "<NYLAS_API_KEY>",
                "<NYLAS_API_URI>",
            )

            credential = nylas.connectors.credentials.update(

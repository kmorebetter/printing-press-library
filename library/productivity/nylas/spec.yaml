              data:
                - calendar_id: 7d93zl2palhxqdy6e5qinsakt
                  conferencing: null
                  provider: Zoom Meeting
                  details:
                    meeting_code: code-123456
                    password: password-123456
                    url: https://zoom.us/j/1234567890?pwd=1234567890
                  created_at: 1661874192

    signature_create:
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - body
            properties:
              name:
                type: string
                description: A label for the signature (for example, "Work", "Personal", or "Mobile").
                example: Work Signature
              body:
                type: string
                description: |-
                  The HTML content of the signature. Maximum 100 KB. Images must use externally hosted URLs
                  (base64 inline images are not supported). Nylas sanitizes the HTML on input to prevent
                  malicious content.
                example: <div><p><strong>Nick Barraclough</strong></p><p>Product Manager | Nylas</p><p><a href="mailto:nick@nylas.com">nick@nylas.com</a></p></div>
          example:
            name: Work Signature
            body: <div><p><strong>Nick Barraclough</strong></p><p>Product Manager | Nylas</p><p><a href="mailto:nick@nylas.com">nick@nylas.com</a></p></div>
    signature_update:

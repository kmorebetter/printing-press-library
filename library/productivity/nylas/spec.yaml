              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/GrantObject'
          description: Grant Created
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
  /v3/grants:
    get:
      summary: Return all grants
      tags:
        - Manage Grants
      operationId: get-all-grants
      description: Returns all grants in your Nylas application.
      security:
        - NYLAS_API_KEY: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
          description: |-
            Returns grants with a matching v2 Nylas account ID. Only applicable for grants migrated from
            Nylas v2.
        - name: account_ids
          in: query
          schema:
            type: string
          description: |-
            Returns grants with a matching list of v2 Nylas account IDs. Only applicable for grants migrated
            from Nylas v2.
        - name: before
          in: query
          schema:
            type: integer
          description: |-
            Returns grants whose `created_at` value is less than or equal to the defined value, in seconds
            using the Unix timestamp format.
        - name: email
          in: query
          schema:
            type: string
            example: nyla@example.com
          description: Returns grants with a matching `email`.
        - name: grant_status
          in: query
          schema:
            type: string
            enum:
              - invalid
              - valid
          description: Filters for only valid or invalid grants.
        - name: ip
          in: query
          schema:
            type: string
          description: Returns grants with a matching IP address.
        - name: limit

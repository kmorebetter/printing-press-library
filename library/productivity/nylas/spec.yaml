  /v3/connect/auth:
    get:
      operationId: get_oauth2_flow
      tags:
        - Authentication APIs
      summary: Hosted OAuth - Authorization Request
      description: |-
        The initial OAuth 2.0 authorization request. Use this endpoint with the required query parameters to start the OAuth 2.0 process. The query parameters pass details to the Nylas API about how the user should authenticate, and where they should go after authenticating.
        This endpoint supports the authorization code flow and optional PKCE settings for client-side only applications. For more information, see the  [Hosted OAuth with access token](/docs/v3/auth/hosted-oauth-accesstoken/) and [Hosted OAuth with access token and PKCE](/docs/v3/auth/hosted-oauth-accesstoken/#create-grants-with-oauth-2.0-and-pkce) documentation.
      x-code-samples:
        - lang: bash
          label: cURL
          source: |
            curl --request GET \
              --url 'https://api.us.nylas.com/v3/connect/auth?client_id=<NYLAS_CLIENT_ID>&redirect_uri=https%3A%2F%2Fyourapp.com%2Fcallback&response_type=code&provider=google&login_hint=user@example.com'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            // Build a hosted-authentication URL. Redirect the user to this URL to start
            // the OAuth flow; Nylas calls back to your `redirectUri` with an authorization
            // code that you exchange for a grant via `nylas.auth.exchangeCodeForToken()`.
            const authUrl = nylas.auth.urlForOAuth2({
              clientId: "<NYLAS_CLIENT_ID>",
              provider: "google",
              redirectUri: "http://localhost:3000/oauth/exchange",
              loginHint: "email_to_connect@example.com",
              accessType: "offline",
            });

            console.log(authUrl);
        - lang: python
          label: Python SDK
          source: |
            @app.route("/nylas/auth", methods=["GET"])
            def login():
              if session.get("grant_id") is None:
                config = URLForAuthenticationConfig({"client_id": "<NYLAS_CLIENT_ID>", 
                    "redirect_uri" : "http://localhost:5000/oauth/exchange"})

                url = nylas.auth.url_for_oauth2(config)
                return redirect(url)
              else:
                return f'{session["grant_id"]}'

            @app.route("/oauth/exchange", methods=["GET"])
            def authorized():
              if session.get("grant_id") is None:
                code = request.args.get("code")

                exchangeRequest = CodeExchangeRequest({"redirect_uri": "http://localhost:5000/oauth/exchange",
                    "code": code, "client_id": "<NYLAS_CLIENT_ID>"})

                exchange = nylas.auth.exchange_code_for_token(exchangeRequest)
                session["grant_id"] = exchange.grant_id

                return redirect(url_for("login"))
        - lang: ruby
          label: Ruby SDK
          source: |
            # frozen_string_literal: true

            require 'nylas'
            require 'sinatra'

            nylas = Nylas::Client.new(
              api_key: "<NYLAS_API_KEY>"
            )

            set :show_exceptions, :after_handler

            error 404 do
              'No authorization code returned from Nylas'
            end

            error 500 do
              'Failed to exchange authorization code for token'
            end

            # Build the hosted-authentication URL and redirect the user there.
            get '/nylas/auth' do
              config = {
                client_id: "<NYLAS_CLIENT_ID>",
                provider: 'google',
                redirect_uri: 'http://localhost:4567/oauth/exchange',
                login_hint: '<email_to_connect>',
                access_type: 'offline'
              }

              url = nylas.auth.url_for_oauth2(config)
              redirect url
            end

            # Receive the authorization code and exchange it for a grant.
            get '/oauth/exchange' do
              code = params[:code]
              status 404 if code.nil?

              begin
                response = nylas.auth.exchange_code_for_token({
                  client_id: "<NYLAS_CLIENT_ID>",
                  redirect_uri: 'http://localhost:4567/oauth/exchange',
                  code: code
                })
              rescue StandardError
                status 500
              else
                "Grant_Id: #{response[:grant_id]} \n Email: #{response[:email]}"
              end
            end
        - lang: java
          label: Java SDK
          source: |
            import com.nylas.NylasClient;
            import com.nylas.models.AccessType;
            import com.nylas.models.AuthProvider;
            import com.nylas.models.UrlForAuthenticationConfig;

            public class HostedAuthUrl {
              public static void main(String[] args) {
                NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();

                // Build a hosted-authentication URL. Redirect the user to this URL to start
                // the OAuth flow; Nylas calls back to your `redirectUri` with an authorization
                // code that you exchange for a grant via `nylas.auth().exchangeCodeForToken()`.
                UrlForAuthenticationConfig config = new UrlForAuthenticationConfig.Builder(
                    "<NYLAS_CLIENT_ID>",
                    "http://localhost:3000/oauth/exchange")
                    .provider(AuthProvider.GOOGLE)
                    .accessType(AccessType.OFFLINE)
                    .loginHint("email_to_connect@example.com")
                    .build();

                String url = nylas.auth().urlForOAuth2(config);

                System.out.println(url);
              }
            }
        - lang: kotlin
          label: Kotlin SDK
          source: |
            import com.nylas.NylasClient
            import com.nylas.models.AccessType
            import com.nylas.models.AuthProvider
            import com.nylas.models.UrlForAuthenticationConfig

            fun main() {
              val nylas = NylasClient.Builder("<NYLAS_API_KEY>").build()

              // Build a hosted-authentication URL. Redirect the user to this URL to start
              // the OAuth flow; Nylas calls back to your `redirectUri` with an authorization
              // code that you exchange for a grant via `nylas.auth().exchangeCodeForToken()`.
              val config = UrlForAuthenticationConfig.Builder(
                  "<NYLAS_CLIENT_ID>",
                  "http://localhost:3000/oauth/exchange")
                  .provider(AuthProvider.GOOGLE)
                  .accessType(AccessType.OFFLINE)
                  .loginHint("email_to_connect@example.com")
                  .build()

              val url = nylas.auth().urlForOAuth2(config)

              println(url)
            }
      parameters:
        - in: query
          name: client_id
          required: true
          description: Your Nylas application's client ID (or application ID).
          schema:
            type: string
        - in: query
          name: provider
          required: false
          description: |-
            The connector provider type that you set up with Nylas for this application. If the provider
            isn't set, the user is directed to the Nylas Hosted login page and prompted to select their
            provider. Multiple providers can be set as a comma-separated list.
          schema:
            type: string
            enum:
              - google
              - microsoft
              - imap
              - icloud
              - yahoo
              - ews
              - zoom
        - in: query
          name: redirect_uri
          required: true
          description: Your project's callback URI (used as the OAuth `redirect_uri`). This is where the OAuth provider sends a user after they authenticate using Hosted OAuth. This must be URL-encoded.
          schema:
            type: string
          example: redirect_uri=https%3A%2F%2Fapp.example.com&
        - in: query
          name: response_type
          required: true
          description: Specifies the type of response Nylas returns for the authorization flow. Should be set to `code` for the OAuth 2.0 flow, and `adminconsent` for the Microsoft admin consent service flow.
          schema:
            type: string
            enum:
              - code
              - adminconsent
        - in: query
          name: scope
          description: |-
            A space-delimited list of scopes that identify the resources that your application may access
            on the user's behalf. If no scopes are set, Nylas uses the default connector scopes.
          schema:
            type: string
        - in: query
          name: prompt
          required: false
          description: |-
            (Optional) The prompt for the Hosted login page. This parameter can accept multiple values
            separated by a comma, without spaces in between. The order of the prompts affects the UI of
            the Hosted login page.

            If `provider` is not set, the user is redirected to the provider page directly, and the prompt
            is ignored.
          schema:
            type: string
            default: select_provider
            enum:
              - select_provider
              - detect
              - select_provider,detect
              - detect,select_provider
        - in: query
          name: state
          description: (Optional) The state of the grant, returned after authentication. The maximum length is 256 characters.
          schema:
            type: string
        - in: query
          name: login_hint
          description: Prefill the login name (usually the email address) during the authentication flow. If a grant already exists for the provided email address, Nylas automatically re-authenticates the grant.
          schema:
            type: string
        - in: query
          name: access_type
          description: Specifies whether Nylas should return a refresh token along with the exchange token. This isn't suitable for client-side or JavaScript applications.
          schema:
            type: string
            enum:
              - offline
              - online
        - in: query
          name: code_challenge
          description: Specifies a Base64-encoded `code_verifier` without padding. The verifier is used as a server-side challenge during the authorization code exchange.
          schema:
            example: e96bf6686a3c3510e9e927db7069cb1cba9b99b022f49483a6ce3270809e68a2
            type: string
        - in: query
          name: code_challenge_method
          description: Specifies the method used to encode the `code_verifier`. The verifier is used as a server-side challenge during the authorization code exchange.
          schema:
            example: S256
            type: string
            enum:
              - plain
              - S256
            default: plain
        - in: query
          name: credential_id
          description: |-
            The ID of an existing Nylas connector's credential record.
            If you set the `response_type` value to `code` then you can use the credential to override an OAuth connector's default settings and create a grant. You need to [create a credential record](/docs/reference/api/connector-credentials/create_credential/) before you can make a credential override request. If not provided, connector's default "active_credential_id" is used.
            If you set the `response_type` value to `adminconsent`, with provider Microsoft, then this will be the OAuth of Microsoft's Service Account Admin Consent flow. You need to [set up the Microsoft connector with an Admin Consent credential before you can make this request](/docs/v3/auth/bulk-auth-grants/#set-up-microsoft-admin-consent-flow).
          schema:
            type: string
            example: e19f8e1a-eb1c-41c0-b6a6-d2e59daf7f47
        - in: query
          name: options
          description: |-
            (Google only) Set to `exclude_google_granted_scopes` to exclude Google-granted scopes from the
            authorization request.
          schema:
            type: string
            example: options=exclude_google_granted_scopes
      responses:
        '302':
          description: Redirects user to provider's authorization page
          headers:
            Location:
              description: Location header.
              schema:
                type: string
                format: url
                example: |
                  https://accounts.google.com/o/oauth2/auth/oauthchooseaccount?prompt=consent&login_hint=email@google.com&access_type=offline&state=<BA630DED06...> &redirect_uri=https://api.us.nylas.com/v3/connect/callback&response_type=code&client_id=<NYLAS_CLIENT_ID>
        '400':
          $ref: '#/components/responses/400'
  /v3/connect/token:
    post:
      operationId: exchange_oauth2_token
      tags:
        - Authentication APIs
      summary: Hosted OAuth - Token exchange
      description: |-
        The standard OAuth token endpoint for Hosted Authentication. This endpoint doesn't require authentication, as it is part of the auth process.
        You can pass one of the following `grant_type` values:
        - `authorization_code`: Exchange the `code` Nylas returns from the OAuth 2.0 authorization flow for tokens (`access_token` and `refresh_token`). - `refresh_token`: Use the existing `refresh_token` for an existing grant to issue a new `access_token`. You _must_ pass your API key in the `client_secret` field.
         - `client_credentials`: Issue a new short-lived (1 hour) `access_token` using an existing `grant_id`. You _must_ pass your API key in the `client_secret` field. This is mainly used in Scheduler implementations.

        This endpoint accepts both `application/json` and `application/x-www-form-urlencoded` request body types. The body parameters are the same for both, with the same naming conventions.
        For more information, see the [Hosted authentication with access token documentation](/docs/v3/auth/hosted-oauth-accesstoken/).
        ### Failed token exchange requests
        Each OAuth `code` is a unique, one-time-use credential. If your token exchange fails, you must restart the OAuth process. If you try to pass the original `code` in another token exchange request, the provider rejects the `code` and Nylas returns an error.
      security: []
      requestBody:
        required: true
        description: ''
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Exchange code
                  description: Exchange an authorization code for access and refresh tokens.
                  required:
                    - code
                    - client_id
                    - client_secret
                    - redirect_uri
                    - grant_type
                  properties:
                    client_id:
                      example: <NYLAS_CLIENT_ID>
                      type: string
                      description: Your Nylas application's client ID.
                    client_secret:
                      example: <NYLAS_API_KEY>
                      type: string
                      description: Your Nylas application's API key.
                    grant_type:
                      example: authorization_code
                      type: string
                      description: Supports exchanging a `code` for a token, or refreshing an access token using a `refresh_token` and `client_credentials` for issuing short-lived access based on the grant id provided.
                      enum:
                        - authorization_code
                    code:
                      type: string
                      description: The `code` from the OAuth 2.0 authorization flow.
                    redirect_uri:
                      example: https://example.com/callback-handler
                      format: url
                      type: string
                      description: |-
                        The URL that Nylas uses to redirect the user to your project after they complete
                        the authorization flow. This should match the `callback_uri` or `redirect_uri` that
                        you used to get the `code` during your initial
                        [authorization request](/docs/reference/api/authentication-apis/get_oauth2_flow/).
                    code_verifier:
                      example: nylas
                      type: string
                      description: |-
                        The plaintext `code` verifier (`code_challenge`) that you created in your
                        [authorization request](/docs/reference/api/authentication-apis/get_oauth2_flow/).
                - type: object
                  title: Refresh access token
                  description: Use a refresh token to issue a new access token.
                  required:
                    - refresh_token
                    - client_id
                    - client_secret
                    - grant_type
                  properties:
                    client_id:
                      example: <NYLAS_CLIENT_ID>
                      type: string
                      description: Your Nylas application's client ID.
                    client_secret:
                      example: <NYLAS_API_KEY>
                      type: string
                      description: Your Nylas application's API key.
                    grant_type:
                      example: refresh_token
                      type: string
                      description: Supports exchanging a `code` for a token, or refreshing an access token using a `refresh_token` and `client_credentials` for issuing short-lived access based on the grant id provided.
                      enum:
                        - refresh_token
                    refresh_token:
                      example: <REFRESH_TOKEN>
                      type: string
                      description: Required to refresh or request a short-lived access token.
                - type: object
                  title: Client credentials
                  description: Issue a short-lived access token for an existing grant.
                  required:
                    - grant_id
                    - client_id
                    - client_secret
                    - grant_type
                  properties:
                    client_id:
                      example: <NYLAS_CLIENT_ID>
                      type: string
                      description: Your Nylas application's client ID.
                    client_secret:
                      example: <NYLAS_API_KEY>
                      type: string
                      description: Your Nylas application's API key.
                    grant_type:
                      example: refresh_token
                      type: string
                      description: Supports exchanging a `code` for a token, or refreshing an access token using a `refresh_token` and `client_credentials` for issuing short-lived access based on the grant id provided.
                      enum:
                        - client_credentials
                    grant_id:
                      example: <GRANT_ID>
                      type: string
                      description: Required to request a short-lived access token for a specific grant.
      responses:
        '200':
          description: The token exchange was successful.
          content:
            application/json:
              schema:
                type: object
                title: data
                properties:
                  access_token:
                    example: <NYLAS_ACCESS_TOKEN>
                    type: string
                    description: Supports exchanging a `code` for a token, or refreshing an access token using a `refresh_token`.
                  expires_in:
                    example: 3600
                    type: integer
                    default: 3600
                    description: The remaining lifetime of the access token, in seconds.
                  id_token:
                    example: <JWT_TOKEN>
                    type: string
                    description: |-
                      A JSON web token (JWT) that contains identity information about a user. It's digitally
                      signed by Nylas.
                  email:
                    example: example@gmail.com
                    type: string
                    description: The email address associated with the provider token exchange.
                  refresh_token:
                    example: <REFRESH_TOKEN>
                    type: string
                    description: Returned only if the `code` was requested using `access_type=offline`.
                  scope:
                    example: https://www.googleapis.com/auth/gmail.readonly profile
                    type: string
                    description: List of scopes associated with this token.
                  token_type:
                    example: Bearer
                    type: string
                    description: Currently always `Bearer`.
                  grant_id:
                    example: <NYLAS_GRANT_ID>
                    type: string
                    description: The ID for the new grant.
                  provider:
                    example: google
                    enum:
                      - google
                      - microsoft
                      - imap
                      - icloud
                      - yahoo
                      - ews
                      - zoom
                    type: string
                    description: The provider name associated with the authorized grant. Only returned during the code exchange process.
        '400':
          description: The token exchange was unsuccessful. Nylas returns a message with a description, and a link to troubleshooting documentation.
          content:
            application/json:
              schema:
                type: object
                title: data
                properties:
                  error:
                    example: invalid_request
                    type: string
                    description: Error type constant.
                  error_description:
                    example: 'Missing required parameter: code'
                    type: string
                    description: A human-readable error description.
                  error_uri:
                    example: developer.nylas.com/docs/api/errors/400-response/
                    type: string
                    description: A URL to the related documentation and troubleshooting regarding this error.
                  error_code:
                    example: 400
                    type: string
                    description: Error code used for referencing the documentation, logs, and data stream.
      x-code-samples:
        - lang: bash
          label: cURL
          source: |
            curl --request POST \
              --url "https://api.us.nylas.com/v3/connect/token" \
              --header 'Content-Type: application/json' \
              --data '{
                "client_id": "<NYLAS_CLIENT_ID>",
                "client_secret": "<NYLAS_API_KEY>",
                "grant_type": "authorization_code",
                "code": "<AUTHORIZATION_CODE>",
                "redirect_uri": "https://example.com/callback-handler",
                "code_verifier": "<CODE_VERIFIER>"
              }'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            // Exchange the authorization code returned by Nylas for an access token and
            // grant ID. Call this from your OAuth callback handler with the `code` query
            // parameter that Nylas appends to your `redirectUri`.
            const code = "<AUTHORIZATION_CODE>";

            try {
              const response = await nylas.auth.exchangeCodeForToken({
                clientId: "<NYLAS_CLIENT_ID>",
                redirectUri: "http://localhost:3000/oauth/exchange",
                code,
                // Only set `codeVerifier` if you used PKCE in the initial authorization request.
                // codeVerifier: "<PKCE_CODE_VERIFIER>",
              });

              console.log("Grant ID:", response.grantId);
              console.log("Access token:", response.accessToken);
            } catch (error) {
              console.error("Error exchanging code for token:", error);
            }
        - lang: python
          label: Python SDK
          source: |
            from flask import Flask, request
            from nylas import Client

            nylas = Client(
                "<NYLAS_API_KEY>",
                "<NYLAS_API_URI>",
            )

            app = Flask(__name__)
            REDIRECT_URI = "http://localhost:9000/oauth/exchange"

            @app.route("/oauth/exchange", methods=["GET"])
            def exchange_code_for_token():
                code_exchange_response = nylas.auth.exchange_code_for_token(
                    request={
                        "code": request.args.get("code"),
                        "client_id": "<NYLAS_CLIENT_ID>",
                        "redirect_uri": REDIRECT_URI,
                    }
                )

                return {
                    "email_address": code_exchange_response.email,
                    "grant_id": code_exchange_response.grant_id,
                }
        - lang: ruby
          label: Ruby SDK
          source: |
            # frozen_string_literal: true

            require 'nylas'
            require 'sinatra'

            nylas = Nylas::Client.new(
              api_key: "<NYLAS_API_KEY>"
            )

            set :show_exceptions, :after_handler

            # Receive the authorization code from Nylas and exchange it for a grant.
            get '/oauth/exchange' do
              code = params[:code]
              status 404 if code.nil?

              begin
                response = nylas.auth.exchange_code_for_token({
                  client_id: "<NYLAS_CLIENT_ID>",
                  redirect_uri: 'http://localhost:4567/oauth/exchange',
                  code: code
                })
              rescue StandardError
                status 500
              else
                grant_id = response[:grant_id]
                email = response[:email]

                "Grant_Id: #{grant_id} \n Email: #{email}"
              end
            end
        - lang: java
          label: Java SDK
          source: |
            import com.nylas.NylasClient;
            import com.nylas.models.CodeExchangeRequest;
            import com.nylas.models.CodeExchangeResponse;

            public class ExchangeCodeForToken {
              public static void main(String[] args) {
                NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();

                // Exchange the authorization code returned by Nylas for an access token and
                // grant ID. Call this from your OAuth callback handler with the `code` query
                // parameter that Nylas appends to your `redirectUri`.
                CodeExchangeRequest codeRequest = new CodeExchangeRequest.Builder(
                    "http://localhost:3000/oauth/exchange",
                    "<AUTHORIZATION_CODE>",
                    "<NYLAS_CLIENT_ID>")
                    // Only set codeVerifier if you used PKCE in the initial authorization request.
                    // .codeVerifier("<PKCE_CODE_VERIFIER>")
                    .build();

                try {
                  CodeExchangeResponse codeResponse = nylas.auth().exchangeCodeForToken(codeRequest);

                  System.out.println("Grant ID: " + codeResponse.getGrantId());
                  System.out.println("Access token: " + codeResponse.getAccessToken());
                } catch (Exception e) {
                  System.err.println("Error exchanging code for token: " + e);
                }
              }
            }
        - lang: kotlin
          label: Kotlin SDK
          source: |
            import com.nylas.NylasClient
            import com.nylas.models.CodeExchangeRequest

            fun main() {
              val nylas = NylasClient.Builder("<NYLAS_API_KEY>").build()

              // Exchange the authorization code returned by Nylas for an access token and
              // grant ID. Call this from your OAuth callback handler with the `code` query
              // parameter that Nylas appends to your `redirectUri`.
              val codeRequest = CodeExchangeRequest.Builder(
                  "http://localhost:3000/oauth/exchange",
                  "<AUTHORIZATION_CODE>",
                  "<NYLAS_CLIENT_ID>")
                  // Only set codeVerifier if you used PKCE in the initial authorization request.
                  // .codeVerifier("<PKCE_CODE_VERIFIER>")
                  .build()

              try {
                val codeResponse = nylas.auth().exchangeCodeForToken(codeRequest)

                println("Grant ID: ${codeResponse.grantId}")
                println("Access token: ${codeResponse.accessToken}")
              } catch (e: Exception) {
                System.err.println("Error exchanging code for token: $e")
              }
            }
  /v3/connect/revoke:
    post:
      operationId: revoke_oauth2_token_and_grant
      tags:
        - Authentication APIs
      summary: Hosted OAuth - Revoke OAuth token
      description: |-
        Revokes the specified OAuth access token. When you revoke the token, Nylas _doesn't_ revoke the
        grant or the associated provider token. This means that a user can re-authenticate to get a new
        access token for the existing grant, so their `grant_id` doesn't change.

        If you revoke a Nylas access token, Nylas also revokes all child tokens and the parent
        `refresh_token` attached to the access token.
      parameters:
        - in: query
          name: token
          schema:
            type: string
          required: true
          description: The token to revoke
      responses:
        '200':
          description: The token was revoked successfully.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: The token could not be revoked, possibly because it was invalid or already expired.
          content:
            application/json:
              schema:
                type: object
                title: data
                properties:
                  error:
                    example: invalid_token
                    type: string
                    description: Error type constant.
                  error_description:
                    example: Token expired or revoked
                    type: string
                    description: Human readable error description.
                  error_uri:
                    example: developer.nylas.com/docs/api/errors/400-response/
                    type: string
                    description: A url to the related documentation and troubleshooting regarding this error.
                  error_code:
                    example: 400
                    type: string
                    description: Error code used for referencing the docs, logs and data stream.
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/connect/revoke?token=<TOKEN>' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            // Configure the Nylas SDK with your API key and server URL
            const NylasConfig = {
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            };

            const nylas = new Nylas(NylasConfig);

            const revokeToken = async () => {
              try {
                const token = "<TOKEN>";
                const response = await nylas.auth.revoke(token);

                console.log("Token Revoked:", response);
              } catch (error) {
                console.error("Error removing connector:", error);
              }
            };

            revokeToken();
        - lang: python
          label: Python SDK
          source: |-
            import sys
            from nylas import Client

            nylas = Client(
                "<NYLAS_API_KEY>",
                "<NYLAS_API_URI>"
            )

            request = nylas.auth.revoke(
              "<TOKEN>",
            )

            print(request)
        - lang: ruby
          label: Ruby SDK
          source: |
            # frozen_string_literal: true

            require 'nylas'

            nylas = Nylas::Client.new(
              api_key: "<NYLAS_API_KEY>"
            )

            begin
              nylas.auth.revoke("<NYLAS_AUTH_TOKEN>")
              puts "The token was successfully revoked"
            rescue Nylas::NylasApiError => e
              puts "The token could not be revoked: #{e.message}"
            end
        - lang: java
          label: Java SDK
          source: |
            import com.nylas.NylasClient;
            import com.nylas.models.TokenParams;

            public class Main {
                public static void main(String[] args) {
                    NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();
                    TokenParams token = new TokenParams("<NYLAS_ACCESS_TOKEN>");

                    try {
                        boolean tokenStatus = nylas.auth().revoke(token);
                        if (tokenStatus) {
                            System.out.println("The token was successfully removed");
                        } else {
                            System.out.println("The token cannot be removed");
                        }
                    } catch (Exception e) {
                        System.out.println("Invalid token cannot be removed");
                    }
                }
            }
        - lang: kotlin
          label: Kotlin SDK
          source: |
            import com.nylas.NylasClient
            import com.nylas.models.*

            fun main() {
                val nylas: NylasClient = NylasClient(
                    apiKey = "<NYLAS_API_KEY>"
                )

                val token = TokenParams("<NYLAS_ACCESS_TOKEN>")

                try {
                    val tokenStatus = nylas.auth().revoke(token)
                    if (tokenStatus) {
                        println("The token was successfully removed")
                    } else {
                        println("The token cannot be removed")
                    }
                } catch (e: Exception) {
                    print("Invalid token cannot be removed")
                }
            }
  /v3/connect/tokeninfo:

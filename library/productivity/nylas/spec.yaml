    configurations:
      description: Configuration objects returned
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/common_response_with_cursor'
              - properties:
                  data:
                    type: array
                    items:
                      type: object
                      oneOf:
                        - title: Standard Configuration
                          description: Single-host configuration for one-on-one bookings.
                          properties:
                            appearance:
                              type:
                                - object
                                - 'null'
                              example: null
                            availability:
                              type: object
                              description: The rules that determine available time slots for the event.
                              properties:
                                availability_rules:
                                  type: object
                                  description: A list of availability rules that apply to all participants.
                                  properties:
                                    availability_method:
                                      type: string
                                      description: The method Nylas uses to calculate availability for all participants.
                                      example: collective
                                    buffer:
                                      type: object
                                      description: A list of rules that set buffer time around events for all participants.
                                      properties:
                                        after:
                                          type: integer
                                          description: |-
                                            The amount of buffer time to add after meetings. For example, if
                                            an account has a meeting scheduled from 10:00–11:00a.m., and you
                                            set an after buffer of 15 minutes, Nylas treats 10:00–11:15a.m. as
                                            busy.
                                          example: 15
                                        before:
                                          type: integer
                                          description: |-
                                            The amount of buffer time to add before meetings. For example, if
                                            an account has a meeting scheduled from 10:00–11:00a.m., and you
                                            set a before buffer of 30 minutes, Nylas treats 9:30–11:00a.m. as
                                            busy.
                                          example: 5
                                duration_minutes:
                                  type: integer
                                  description: The total duration of the event, in minutes.
                                  example: 30
                                interval_minutes:
                                  type: integer
                                  description: The interval between meetings, in minutes.
                                  example: 15
                                round_to:
                                  type: integer
                                  description: |-
                                    Nylas rounds each time slot to the nearest `round_to` value. For example,
                                    if a time slot starts at 9:05a.m. and `round_to` is set to 15, Nylas rounds
                                    it to 9:15a.m.
                                  example: 5
                            event_booking:
                              type: object
                              description: An object containing details about the booking.
                              properties:
                                booking_type:
                                  type: string
                                  description: The booking type.
                                  example: booking
                                disable_emails:
                                  type:
                                    - boolean
                                    - 'null'
                                  description: |-
                                    When `true`, Nylas doesn't send email notifications when an event is booked,
                                    cancelled, or rescheduled. When `null`, the default behavior applies (emails are sent).
                                  example: false
                                hide_participants:
                                  type:
                                    - boolean
                                    - 'null'
                                  description: When `true`, Nylas creates the event with `hide_participants=true`, so the host can see who's on the event but the guests cannot. When `null`, the default behavior applies (participants are visible).
                                  example: false
                                location:
                                  type: string
                                  description: The location of the event.
                                  example: Conference room 104
                                notify_participants:
                                  type:
                                    - boolean
                                    - 'null'
                                  description: |-
                                    When `true`, the calendar provider sends notifications to participants
                                    when the event is created, updated, or deleted. Microsoft grants ignore
                                    this flag and always notify participants. This field may be `null` if not
                                    explicitly set on the configuration; treat `null` the same as `false`.
                                  example: false
                                reminders:
                                  type: array
                                  description: A list of reminders for the event.
                                  items:
                                    type: object
                                    properties:
                                      minutes_before_event:
                                        type: integer
                                        description: The number of minutes before the event to send the reminder.
                                        example: 15
                                      recipient:
                                        type: string
                                        description: (Email reminders only) Who should receive the reminder.
                                        example: all
                                      type:
                                        type: string
                                        description: The reminder type.
                                        example: email
                                timezone:
                                  type: string
                                  description: |-
                                    The event's timezone as an
                                    [IANA-formatted](https://en.wikipedia.org/wiki/Tz_database) string.
                                  example: America/New York
                                title:
                                  type: string
                                  description: The event title.
                                  example: Weekly One-on-One
                            id:
                              type: string
                              description: The Configuration ID.
                              example: 26e98405-3b48-47d2-898a-7254f1fad8d7
                            name:
                              type: string
                              description: The name of the Scheduling Page.
                              example: Leyah & Nyla Weekly One-on-One
                            participants:
                              type: array
                              description: A list of participants included in the scheduled event.
                              items:
                                type: object
                                properties:
                                  availability:
                                    type: object
                                    description: The availability settings for the participant.
                                    properties:
                                      calendar_ids:
                                        type: array
                                        description: A list of calendar IDs used to check the participant's availability.
                                        items:
                                          type: string
                                        example:
                                          - primary
                                      open_hours:
                                        type: array
                                        description: |-
                                          An array of objects representing the participant's open hours. Nylas
                                          searches for free time slots within these open hours.
                                        items:
                                          type: object
                                          properties:
                                            days:
                                              type: array
                                              description: |-
                                                The days of the week that the open hour settings are applied
                                                to. Sunday corresponds to `0`, and Saturday corresponds to `6`.
                                              items:
                                                type: integer
                                              example:
                                                - 1
                                                - 2
                                                - 3
                                                - 4
                                                - 5
                                            end:
                                              type: string
                                              description: The end time in 24-hour time format.
                                              example: '14:00'
                                            exdates:
                                              type: array
                                              description: |-
                                                A list of dates that are excluded from the participant's open
                                                hours, in `YYYY-MM-DD` format.
                                              items:
                                                type: string
                                              example:
                                                - '2025-01-18'
                                            start:
                                              type: string
                                              description: The start time in 24-hour time format.
                                              example: '10:00'
                                            timezone:
                                              type: string
                                              description: |-
                                                The participant's timezone as an
                                                [IANA-formatted](https://en.wikipedia.org/wiki/Tz_database)
                                                string. Nylas uses this when calculating the participant's open
                                                hours and in email notifications.
                                              example: America/New York
                                  booking:
                                    type: object
                                    description: The participant's booking data.
                                    properties:
                                      calendar_id:
                                        type: string
                                        description: The ID of the calendar the event was created on.
                                        example: primary
                                  email:
                                    type: string
                                    description: The participant's email address.
                                    example: leyah@example.com
                                  name:
                                    type: string
                                    description: The participant's name.
                                    example: Leyah Miller
                                  is_organizer:
                                    type: boolean
                                    description: When `true`, shows that the participant is the organizer of the event.
                                    example: true
                            requires_session_auth:
                              type:
                                - boolean
                                - 'null'
                              description: |-
                                When `true`, the scheduling Availability and Bookings endpoints require a valid
                                session ID to authenticate requests using the Configuration. This field may be
                                `null` if not explicitly set; treat `null` the same as `false`.
                              example: false
                            scheduler:
                              type: object
                              properties:
                                additional_fields:
                                  type: object
                                  description: An object containing additional custom fields.
                                  properties:
                                    example_field:
                                      type: object
                                      properties:
                                        label:
                                          type: string
                                          description: The text label to be displayed in the Scheduler UI.
                                          example: Sample field
                                        order:
                                          type: integer
                                          description: |-
                                            The order in which the field is displayed in the Scheduler UI.
                                            Fields with lower order values are displayed first.
                                          example: 4
                                        required:
                                          type: boolean
                                          description: When `true`, marks the field as required.
                                          example: false
                                        type:
                                          type: string
                                          description: The field type.
                                          example: multi_line_text
                                available_days_in_future:
                                  type: integer
                                  description: |-
                                    The number of days in the future that Scheduler is available for scheduling
                                    events.
                                  example: 30
                                email_template:
                                  type: object
                                  description: Template settings for email notifications.
                                  properties:
                                    booking_confirmed:
                                      type: object
                                      description: Template settings for confirmation notifications.
                                      properties:
                                        body:
                                          type: string
                                          description: The body text of the message.
                                          example: Your weekly one-on-one with Nyla has been confirmed.
                                        title:
                                          type: string
                                          description: The title of the message.
                                          example: 'Confirmed: Weekly One-on-One'
                                    organizer_locale:
                                      type: string
                                      description: The organizer's locale settings.
                                      example: en
                                min_booking_notice:
                                  type:
                                    - integer
                                    - 'null'
                                  description: |-
                                    The minimum number of minutes in the future that a user can schedule a new
                                    booking. This field may be `null` if not explicitly set; treat `null` the
                                    same as `60`.
                                  example: 30
                                min_cancellation_notice:
                                  type: integer
                                  description: |-
                                    The minimum amount of time before a meeting that the booking can still be
                                    cancelled, in minutes.
                                  example: 30
                            slug:
                              type:
                                - string
                                - 'null'
                              description: |-
                                The Configuration slug. You can use this instead of the `configuration_id`
                                when making requests to other Scheduling endpoints. This field may be `null`
                                if no slug has been set.
                              example: xyz-en
                        - title: Group Configuration
                          description: Multi-host configuration for group event bookings.
                          properties:
                            appearance:
                              type:
                                - object
                                - 'null'
                              example: null
                            group_booking:
                              type: object
                              description: An object containing details about the group booking.
                              properties:
                                booking_type:
                                  type: string
                                  description: The booking type.
                                  example: booking
                                calendar_id:
                                  type: string
                                  description: The ID of the calendar on which the group event is created.
                                  example: primary
                                default_capacity:
                                  type: integer
                                  description: The default capacity for the booking.
                                  example: 50
                                disable_emails:
                                  type:
                                    - boolean
                                    - 'null'
                                  description: |-
                                    When `true`, Nylas doesn't send email notifications when an event is booked,
                                    cancelled, or rescheduled. When `null`, the default behavior applies (emails are sent).
                                  example: false
                                reminders:
                                  type: array
                                  description: A list of reminders for the event.
                                  items:
                                    type: object
                                    properties:
                                      minutes_before_event:
                                        type: integer
                                        description: The number of minutes before the event to send the reminder.
                                        example: 15
                                      recipient:
                                        type: string
                                        description: (Email reminders only) Who should receive the reminder.
                                        example: all
                                      type:
                                        type: string
                                        description: The reminder type.
                                        example: email
                                title:
                                  type: string
                                  description: The event title.
                                  example: Annual Philosophy Club Meeting
                            id:
                              type: string
                              description: The group Configuration ID.
                              example: 26e98405-3b48-47d2-898a-7254f1fad8d7
                            name:
                              type: string
                              description: The name of the Scheduling Page.
                              example: Annual Philosophy Club Meeting
                            requires_session_auth:
                              type:
                                - boolean
                                - 'null'

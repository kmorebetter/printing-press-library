        - lang: ruby
          label: Ruby SDK
          source: "require 'nylas'\t\n\nnylas = Nylas::Client.new(\n\t  api_key: \"<NYLAS_API_KEY>\"\n)\n\nquery_params = {\n    id_token: \"<ACCESS_TOKEN_ID>\"\n}\n\ntoken_info = nylas.auth.access_token_info(query_params: query_params)\n\nputs token_info\n"
        - lang: java
          label: Java SDK
          source: |
            import com.nylas.NylasClient;
            import com.nylas.models.*;

            public class GetTokenInfo {
              public static void main(String[] args) throws NylasSdkTimeoutError, NylasApiError {
                NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();
                Response<TokenInfoResponse> token = nylas.auth().idTokenInfo("<ACCESS_TOKEN_ID>");
                
                System.out.println(token);
              }
            }
        - lang: kotlin
          label: Kotlin SDK
          source: |
            import com.nylas.NylasClient

            fun main(args: Array<String>) {
              val nylas: NylasClient = NylasClient(
                  apiKey = "<NYLAS_API_KEY>"
              )

              val token = nylas.auth().idTokenInfo("<ACCESS_TOKEN_ID>")
              
              print(token)
            }
  /v3/connect/custom:
    post:
      summary: Bring Your Own Authentication
      tags:
        - Manage Grants
        - Authentication APIs
      operationId: byo_auth
      description: |-
        Manually creates a grant using the Bring Your Own (BYO) Authentication flow. If you're handling the
        OAuth flow in your own project or you want to migrate existing users, BYO Auth lets you provide
        the user's `refresh_token` to create a grant.

        If a user previously authenticated with your Nylas application using the same email address, Nylas
        detects this and re-authenticates their existing grant instead of creating a new one. The API
        response contains the user's existing `grant_id`.

        ### Supported providers

        Pick the request body variant that matches your provider:

        - **Refresh token** — OAuth providers (`google`, `microsoft`, `yahoo`, `zoom`) using a standard refresh token.
        - **Credential override** — OAuth providers, but using a stored [credential record](/docs/reference/api/connector-credentials/) to swap in different client credentials.
        - **Microsoft bulk auth** — Microsoft App Permissions. Requires a [connector credential](/docs/reference/api/connector-credentials/create_credential/) and the [admin consent flow](/docs/v3/auth/bulk-auth-grants/#make-a-microsoft-admin-consent-flow-request-using-nylas-apis).
        - **Google bulk auth** — Google Service Accounts. Requires a [connector credential](/docs/reference/api/connector-credentials/create_credential/) and the [Service Account flow](/docs/v3/auth/bulk-auth-grants/#google-app-permission-via-nylas).
        - **IMAP** — direct IMAP/SMTP credentials for any IMAP provider.
        - **iCloud** — an iCloud email address plus an [Apple app password](https://support.apple.com/en-us/HT204397).
        - **EWS** — on-premises Microsoft Exchange; hosted Exchange should use Microsoft Graph instead.
        - **Virtual calendar** — a [Virtual Calendar](/docs/v3/calendar/virtual-calendars/) grant for scheduling without a third-party provider.
        - **Zoom Meetings** — Zoom OAuth. Your OAuth app must include the [granular scopes](https://developers.zoom.us/docs/integrations/oauth-scopes-granular/) `meeting:write:meeting`, `meeting:update:meeting`, and `meeting:delete:meeting`.
        - **Nylas (Agent Account)** — a fully Nylas-hosted [Agent Account](/docs/v3/agent-accounts/) email and calendar mailbox on a domain you've registered with Nylas.
      security:
        - NYLAS_API_KEY: []
      requestBody:
        required: true
        description: ''
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Refresh token
                  description: Use an OAuth refresh token to create a grant.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's OAuth provider.
                      enum:
                        - google
                        - microsoft
                        - yahoo
                        - zoom
                    settings:
                      description: A list of settings required by the provider, including the `refresh_token`.
                      example:
                        refresh_token: 1//09XpDHQ6hq6PrCgYIARAAGAkSNwF...
                      type: object
                      properties:
                        refresh_token:
                          type: string
                          description: The refresh token associated with the email account.
                          example: 1//09XpDHQ6hq6PrCgYIARAAGAkSNwF...
                - type: object
                  title: Credential override
                  description: Override the connector's client credentials with a stored credential record.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's OAuth provider.
                      enum:
                        - google
                        - microsoft
                        - yahoo
                        - zoom
                    settings:
                      description: |-
                        A list of settings required by the provider, including the `refresh_token`.

                        If you add the `credential_id` field with the UUID of an existing
                        [credential record](/docs/reference/api/connector-credentials/), Nylas uses the
                        provider's `client_id` and `client_secret` from the credential record.
                      example:
                        refresh_token: 1//09XpDHQ6hq6PrCgYIARAAGAkSNwF...
                        credential_id: e280d2fa-86db-4937-81c9-ffbd539872d6
                      type: object
                      properties:
                        refresh_token:
                          type: string
                          description: The refresh token associated with the email account.
                          example: 1//09XpDHQ6hq6PrCgYIARAAGAkSNwF...
                        credential_id:
                          type: string
                          description: |-
                            The UUID of an existing
                            [credential record](/docs/reference/api/connector-credentials/) that Nylas
                            can use to override the default connector settings.
                - type: object
                  title: Microsoft bulk auth
                  description: Create a grant via Microsoft admin-consent App Permissions.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's OAuth provider.
                      enum:
                        - microsoft
                    settings:
                      description: |-
                        A list of settings required by Microsoft. This sets the user's email address and
                        the Nylas `credential_id`.

                        If a grant already exists for the provided email address, Nylas automatically starts
                        the re-authentication process.
                      example:
                        email_address: user@office365.com
                        credential_id: e280d2fa-86db-4937-81c9-ffbd539872d6
                      type: object
                      properties:
                        email_address:
                          type: string
                          description: The user's email address.
                          example: user@office365.com
                        credential_id:
                          type: string
                          description: |-
                            The ID of an existing `adminconsent` credential that Nylas can use to
                            authenticate Microsoft App Permission grants.
                          example: e280d2fa-86db-4937-81c9-ffbd539872d6
                - type: object
                  title: Google bulk auth
                  description: Create a grant via a Google Service Account.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's OAuth provider.
                      enum:
                        - google
                    settings:
                      description: |-
                        A list of settings required by Google. This sets the user's email address and the
                        Nylas `credential_id`.

                        If a grant already exists for the provided email address, Nylas automatically starts
                        the re-authentication process.
                      example:
                        email_address: user@gmailworkspace.com
                        credential_id: e280d2fa-86db-4937-81c9-ffbd539872d6
                      type: object
                      properties:
                        email_address:
                          type: string
                          description: The user's email address.
                          example: user@gmailworkspace.com
                        credential_id:
                          type: string
                          description: |-
                            The ID of an existing `serviceaccount` credential that Nylas can use to
                            authenticate Google Service Account grants.
                          example: e280d2fa-86db-4937-81c9-ffbd539872d6
                        scopes:
                          type: array
                          items:
                            type: string
                          description: A list of scopes for the grant.
                          example:
                            - https://www.googleapis.com/auth/userinfo.email
                            - https://www.googleapis.com/auth/userinfo.profile
                            - https://www.googleapis.com/auth/gmail.readonly
                - type: object
                  title: IMAP
                  description: Create an IMAP grant using username, password, and server details.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's provider.
                      enum:
                        - imap
                    settings:
                      description: |-
                        A list of settings needed for Nylas to connect to the provider's IMAP server. If
                        the provider uses a different address or credentials for SMTP (to send email),
                        include that information separately in the SMTP fields.
                      example:
                        imap_username: <IMAP_USERNAME>
                        imap_password: <IMAP_PASSWORD>
                        imap_host: <IMAP_HOST>
                        imap_port: '993'
                        smtp_host: <SMTP_HOST>
                        smtp_port: '465'
                        smtp_username: <SMTP_USERNAME>
                        smtp_password: <SMTP_PASSWORD>
                      type: object
                      properties:
                        imap_username:
                          type: string
                          description: The user's username or email address.
                          example: nyla@example.com
                        imap_password:
                          type: string
                          description: The user's email account password or app password.
                        imap_host:
                          type: string
                          description: |-
                            The IMAP host. If you don't define the host in the request payload, Nylas tries
                            to auto-detect the hostname using the provided `imap_username`. If you're using
                            a self-hosted IMAP server, you _must_ provide the hostname.
                          example: imap.mail.me.com
                        imap_port:
                          type: integer
                          description: |-
                            The IMAP port number. If you don't define the port in the request payload, Nylas
                            tries to auto-detect it using the provided `imap_username`. If you're using a
                            self-hosted IMAP server, you _must_ provide the port number.
                          example: 993
                        smtp_host:
                          type: string
                          description: |-
                            The SMTP host. If you don't define the host in the request payload, Nylas tries
                            to auto-detect it using the provided `imap_username`. If you're using a self-
                            hosted SMTP server, you _must_ provide the hostname.
                          example: smtp.mail.me.com
                        smtp_port:
                          type: integer
                          description: |-
                            The SMTP port number. If you don't define the port in the request payload, Nylas
                            tries to auto-detect it using the provided `imap_username`. If you're using a
                            self-hosted SMTP server, you _must_ provide the port number.
                          example: 587
                        smtp_username:
                          type: string
                          description: |-
                            The user's SMTP username, if their SMTP credentials are different from their
                            IMAP credentials.
                          example: nyla@example.com
                        smtp_password:
                          type: string
                          description: |-
                            The user's SMTP password, if their SMTP credentials are different from their
                            IMAP credentials.
                - type: object
                  title: iCloud
                  description: Create an iCloud grant using an email address and app password.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's provider.
                      enum:
                        - icloud
                    settings:
                      description: A list of settings required by iCloud.
                      example:
                        username: <ICLOUD_USERNAME>
                        password: <ICLOUD_PASSWORD>
                      type: object
                      properties:
                        username:
                          type: string
                          description: The user's iCloud email address.
                          example: example@icloud.com
                        password:
                          type: string
                          description: The user's app password.
                - type: object
                  title: EWS
                  description: Create a grant for an on-premises Microsoft Exchange account.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's provider.
                      enum:
                        - ews
                    settings:
                      description: A list of settings required by EWS.
                      example:
                        email: nyla@ews.example.com
                        ews_username: <EWS_USERNAME>
                        ews_password: <EWS_PASSWORD>
                        ews_host: <EWS_HOST>
                      type: object
                      properties:
                        email:
                          type: string
                          description: The user's email address.
                          example: nyla@ews.example.com
                        ews_username:
                          type: string
                          description: The user's Exchange username, formatted as an email address.
                          example: nyla@ews.example.com
                        ews_password:
                          type: string
                          description: The user's Microsoft Exchange password.
                        ews_host:
                          type: string
                          description: |-
                            The EWS host. If you don't define the host in the request payload, Nylas tries
                            to auto-detect it using the provided `ews_username`. If you're using a self-
                            hosted EWS server, you _must_ provide the hostname.
                          example: ews.mail.example.com
                        ews_port:
                          type: integer
                          description: The EWS port number.
                          default: 443
                    scope:
                      type: array
                      items:
                        type: string
                      description: A list of scopes for the grant.
                      example:
                        - ews.messages
                        - ews.calendars
                        - ews.contacts
                - type: object
                  title: Virtual calendar
                  description: Create a Virtual Calendar grant for scheduling without a provider.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The account's provider.
                      enum:
                        - virtual-calendar
                      example: virtual-calendar
                    settings:
                      description: A list of settings required by Nylas.
                      type: object
                      properties:
                        email:
                          type: string
                          description: |-
                            The virtual account identifier. This can be any arbitrary string — it doesn't
                            have to be in email address format.
                          example: floor1desk24@example.com
                    state:
                      type: string
                      description: |-
                        An optional state value that Nylas returns to your project when the authentication
                        flow completes. If you include the `state`, Nylas returns the unmodified value to
                        your project. You can use this for verification, or to track information about the
                        account.

                        For more information about the `state` parameter, see the
                        [OAuth 2.0 specification](https://datatracker.ietf.org/doc/html/rfc6749) or the
                        [official OAuth 2.0 documentation](https://www.oauth.com/oauth2-servers/authorization/the-authorization-request/).
                      example: my-state
                - type: object
                  title: Zoom Meetings
                  description: Create a Zoom Meetings grant from an OAuth refresh token.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The user's OAuth provider (in this case, `zoom`).
                      enum:
                        - zoom
                    settings:
                      description: A list of settings required by Zoom.
                      type: object
                      properties:
                        refresh_token:
                          type: string
                          description: The `refresh_token` from the Zoom `code` exchange flow.
                          example: <ZOOM_REFRESH_TOKEN>
                - type: object
                  title: Nylas (Agent Account)
                  description: Create a Nylas-hosted Agent Account on a domain you've registered.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: The account's provider. Use `nylas` to create an Agent Account.
                      enum:
                        - nylas
                      example: nylas
                    settings:
                      description: The settings required for a Nylas Agent Account.
                      example:
                        email: user@yourdomain.com
                        policy_id: b1c2d3e4-5678-4abc-9def-0123456789ab
                      type: object
                      required:
                        - email
                      properties:
                        email:
                          type: string
                          description: |-
                            The Agent Account's email address. The email's domain must match a domain you've already
                            [registered with Nylas](/docs/reference/api/manage-domains/).
                          example: user@yourdomain.com
                        policy_id:
                          type: string
                          description: |-
                            The ID of a [policy](/docs/reference/api/policies/) to apply to this grant. Only valid when
                            `provider` is `nylas`. If omitted, the grant inherits the `policy_id` set on the `nylas`
                            connector (if any).
                          example: b1c2d3e4-5678-4abc-9def-0123456789ab
                        app_password:
                          type: string
                          description: |-
                            Optional password that unlocks IMAP and SMTP-submission access to the Agent Account.
                            Omit it and protocol-level access stays disabled. Must be 18–40 printable ASCII
                            characters (codes 33–126) and contain at least one uppercase letter, one lowercase
                            letter, and one digit. Stored as a bcrypt hash — it can't be retrieved later, only
                            reset by updating the grant. See [Connect mail clients to an Agent Account](/docs/v3/agent-accounts/mail-clients/).
                          minLength: 18
                          maxLength: 40
                          example: MySecureP4ssword!2024

    group_event_create:
      description: Create a group event
      content:
        application/json:
          schema:
            type: object
            required:
              - calendar_id
              - capacity
              - participants
              - title
              - when
            properties:
              calendar_id:
                type: string
                description: The ID of the calendar to access.
                example: primary
              capacity:
                type: integer
                description: The maximum number of attendees allowed in the event.
                minimum: 1
                maximum: 500
                default: 10
                example: 50
              conferencing:
                type: object
                description: |-
                  An object that lets you automatically create a conference, or enter conferencing details
                  manually.
                oneOf:
                  - $ref: '#/components/schemas/event_conferencing_request'
                  - title: Read-only object
                    type: object
                    description: Read-only placeholder. Returned only in responses.
                    readOnly: true
              description:
                type: string
                description: |-
                  A brief description of the group event (for example, its agenda). Nylas might return the
                  description as an HTML string, depending on how the provider formats it.
                example: Come ready to talk philosophy today!
              location:
                type: string
                description: |-
                  The location of the group event (for example, a physical address or the name of a meeting
                  room).
                maxLength: 255
                example: New York Public Library, Cave Room
              participants:
                type: object
                description: A list of participants to be included in the group event.
                properties:
                  name:
                    type: string
                    description: The participant's name.
                    example: Leyah Miller
                  email:
                    type: string
                    description: The participant's email address.
                    example: leyah@example.com
                  is_organizer:
                    type: boolean
                    description: When `true`, indicates that the participant is the organizer for the event.
                    example: true
              recurrence:
                $ref: '#/components/schemas/group_event_recurrence'
              title:
                type: string
                description: The name of the group event.
                maxLength: 1024
                example: Annual Philosophy Club Meeting
              when:
                type: object
                description: An object representing the time and duration of the group event.
                oneOf:
                  - $ref: '#/components/schemas/event_timespan'
                  - title: Read-only object
                    type: object
                    description: Read-only placeholder. Returned only in responses.
                    readOnly: true
    group_event_update:
      description: Update a group event
      content:
        application/json:
          schema:
            type: object
            properties:
              calendar_id:
                type: string
                description: The ID of the calendar to access.
                example: primary
              capacity:
                type: integer
                description: The maximum number of attendees allowed in the event.
                minimum: 1
                maximum: 500
                default: 10
                example: 50
              conferencing:
                type: object
                description: |-
                  An object that lets you automatically create a conference, or enter conferencing details
                  manually.
                oneOf:

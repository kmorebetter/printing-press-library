  /v3/scheduling/availability:
    parameters:
      - schema:
          type: string
        name: start_time
        in: query
        required: true
        description: The time from which to check availability, in seconds using the Unix timestamp format.
      - schema:
          type: string
        name: end_time
        in: query
        required: true
        description: The time until which to check availability, in seconds using the Unix timestamp format.
      - schema:
          type: string
        name: configuration_id
        in: query
        required: false
        description: |-
          The ID of the Configuration object used for calculating availability. If you're using session
          authentication (`requires_session_auth: true`), the `configuration_id` isn't required.
      - schema:
          type: string
        name: slug
        in: query
        required: false
        description: |-
          The Configuration object slug. You can use this with the `client_id` instead of using the
          `configuration_id`. If you're using session authentication (`requires_session_auth: true`) or
          using the `configuration_id`, `slug` isn't required.
      - schema:
          type: string
        name: client_id
        in: query
        required: false
        description: |-
          The client ID that was used to create the Configuration object. Required only if you're using
          `slug`.
      - schema:
          type: string
        name: booking_id
        in: query
        required: false
        description: |-
          The ID of the booking to reschedule, if you're checking availability to reschedule a round-robin
          booking. Required only if `availability_method` is `max-fairness` or `max-availability`. See
          [Retrieve booking IDs](/docs/v3/scheduler/retrieve-booking-ids/) for more information.
    get:
      summary: Get availability
      tags:
        - Availability
      x-scopes:
        google:
          min: https://www.googleapis.com/auth/calendar.readonly
          others: https://www.googleapis.com/auth/calendar
        microsoft:
          min: https://graph.microsoft.com/Calendars.Read
          others: https://graph.microsoft.com/Calendars.ReadWrite
      operationId: get-availability
      description: |-
        Gets available time slots within the given time range, using the rules defined in the specified
        Configuration object. If the Configuration `type` is `group`, Nylas returns only valid group events
        within the time range, including recurring events.

        Nylas validates the provided session ID and uses it to retrieve the related
        [Configuration object](/docs/reference/api/configurations/). If you created a public
        Configuration, you don't need to include the `Authorization` request header with a session ID, but
        you do need to pass the Configuration object ID as a query parameter.
      x-code-samples:
        - lang: bash
          label: cURL (Public)
          source: |-
            curl --compressed --request GET \
              --url 'https://api.us.nylas.com/v3/scheduling/availability?start_time=1709643600&end_time=1709665200&configuration_id=<SCHEDULER_CONFIG_ID>' \
              --header 'Accept: application/json' \
              --header 'Content-Type: application/json'
        - lang: bash
          label: cURL (Private)
          source: |-
            curl --compressed --request GET \
              --url 'https://api.us.nylas.com/v3/scheduling/availability?start_time=1709643600&end_time=1709665200' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <SCHEDULER_SESSION_ID>' \
              --header 'Content-Type: application/json' 
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            async function getAvailability() {
              try {
                const availability = await nylas.scheduler.availability.get({
                  queryParams: {
                    configurationId: "<CONFIGURATION_ID>",
                    startTime: 1748908800,
                    endTime: 1748995200,
                  },
                });

                console.log("Availability:", availability);
              } catch (error) {
                console.error("Error getting availability:", error);
              }
            }

            getAvailability();
      responses:
        '200':
          $ref: '#/components/responses/availability'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '504':
          $ref: '#/components/responses/504'
      security:
        - SCHEDULER_SESSION_TOKEN: []

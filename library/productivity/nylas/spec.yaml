              - end_time
              - event_id
            properties:
              calendar_id:
                type: string
                description: ID of the calendar to access.
                example: primary
              capacity:
                type: number
                description: |-
                  The maximum number of attendees for the event. If not specified, Nylas uses the default
                  capacity for your Configuration.
                minimum: 1
                maximum: 500
                default: 10
                example: 50
              emails:
                type: array
                items:
                  type: string
                description: A list of email addresses associated with the event's participants.
                example:
                  - nyla@example.com
                  - leyah@example.com
              event_id:
                type: string
                description: ID of the event to validate.
                example: 5d3qmne77v32r8l4phyuksl2x
              master_id:
                type: string
                description: The master event ID. Required when working with recurring events.
                example: 5d3qmne77v32r8l4phyuksl2x
    session_create:

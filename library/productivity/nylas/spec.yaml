      | **GET** `/contacts`</br>**GET** `/contacts/<CONTACT_ID>`</br>**GET** `/contact_groups`            | `/contacts.readonly` ☑️</br>`/contacts.other.readonly` ☑️</br>`/directory.readonly`\* ☑️ | `Contacts.Read` ☑️</br>`People.Read`\* ☑️              |
      | **POST** `/contacts`</br>**PUT** `/contacts/<CONTACT_ID>`</br>**DELETE** `/contacts/<CONTACT_ID>` | `/contacts` ☑️                                                                           | `Contacts.ReadWrite` ☑️                                |

      <div id="admonition-info"> 📝 <b>Note</b>: To access Contacts with the <code>inbox</code> source, you must use the <code>contacts.other.readonly</code> Google scope and the <code>People.Read</code> Microsoft scope. For Contacts with the <code>domain</code> source, you must use the <code>directory.readonly</code> Google scope and the <code>People.Read</code> Microsoft scope.
      </div>

      For more information about scopes, see [Using scopes to request user data](/docs/dev-guide/scopes/).

      ## Contacts notifications

      You can subscribe to the following triggers so Nylas notifies you about changes to your users' data:

      - `contact.updated`
      - `contact.deleted`

      For more information, see the [Contact notification schemas](/docs/reference/notifications/#contact-notifications).
  - name: Notetaker
    description: |
      Nylas Notetaker is a real-time meeting bot that you can invite to your online meetings. It records and transcribes your discussion, and delivers results to you using the Nylas API and webhook notifications.

      The [`/v3/grants/<NYLAS_GRANT_ID>/notetakers` endpoints](/docs/reference/api/notetaker/) let you interact with Nylas Notetaker while referencing a specific grant so you can use Notetaker's [calendar sync features](/docs/v3/notetaker/calendar-sync/) for your authenticated users.

      The [`/v3/notetakers` endpoints](/docs/reference/api/standalone-notetaker/) let you send Notetakers that aren't connected to a grant as **standalone Notetakers**.

      ## Calendar sync

      Notetaker works with the Nylas Calendar API to automatically sync with calendars and events. When you sync Notetaker with a grant's calendar or event, Nylas tracks their join times and meeting links so the Notetaker is always sent to the meeting on time.

      ## Webhook notifications

      Nylas sends [webhook notifications](/docs/reference/notifications/#notetaker-notifications) when a Notetaker bot is created, updated, or deleted, and when the recording media is available.
  - name: Standalone Notetaker
    description: |
      Nylas Notetaker is a real-time meeting bot that you can invite to your online meetings. It records and transcribes your discussion, and delivers results to you using the Nylas API and webhook notifications.

      The `/v3/notetakers` endpoints let you interact with Nylas Notetaker without referencing a grant. This lets all your users — even those who haven't authenticated with your Nylas application — use Notetaker in their meetings.
  - name: Application-level templates
    description: |
      Application-level templates let you create reusable messages with dynamic content. Each template is linked to the Nylas application associated with the API key specified in a [Create Template request](/docs/reference/api/application-level-templates/create-app-level-template/).

      <div id="admonition-info">💡 <b>If you want to create templates for specific grants, use the <a href="/docs/reference/api/grant-level-templates/">grant-level templates endpoints</a></b>.</div>

      Nylas supports the following templating engines:

      - [Handlebars](https://handlebarsjs.com/)
      - [mustache }}](https://mustache.github.io/)
      - [Nunjucks](https://mozilla.github.io/nunjucks/)
      - [Twig](https://twig.symfony.com/)

      We recommend you use [mustache }}](https://mustache.github.io/) or [Handlebars](https://handlebarsjs.com/) if you need a simple implementation. If you need more advanced formatting, conditions, or layouts, we recommend [Nunjucks](https://mozilla.github.io/nunjucks/) or [Twig](https://twig.symfony.com/).
  - name: Grant-level templates
    description: |
      Grant-level templates let you create reusable messages with dynamic content. Each template is linked to the grant specified in a [Create Template request](/docs/reference/api/grant-level-templates/create-grant-level-template/).

      <div id="admonition-info">💡 <b>If you want to create templates for a Nylas application, use the <a href="/docs/reference/api/application-level-templates/">application-level templates endpoints</a></b>.</div>

      Nylas supports the following templating engines:

      - [Handlebars](https://handlebarsjs.com/)
      - [mustache }}](https://mustache.github.io/)
      - [Nunjucks](https://mozilla.github.io/nunjucks/)
      - [Twig](https://twig.symfony.com/)

      We recommend you use [mustache }}](https://mustache.github.io/) or [Handlebars](https://handlebarsjs.com/) if you need a simple implementation. If you need more advanced formatting, conditions, or layouts, we recommend [Nunjucks](https://mozilla.github.io/nunjucks/) or [Twig](https://twig.symfony.com/).
  - name: Application-level workflows
    description: |
      Application-level workflows automatically send messages to certain users when a defined event is triggered. For example, if you want to send a confirmation message when a user schedules a booking, you can create a workflow that listens for [`booking.created` events](/docs/reference/notifications/#booking-created-notifications).

      Each workflow is linked to the Nylas application associated with the API key specified in a [Create Workflow request](/docs/reference/api/application-level-workflows/create-workflow/).

      <div id="admonition-info">💡 <b>If you want to create workflows for specific grants, use the <a href="/docs/reference/api/grant-level-workflows/">grant-level workflows endpoints</a></b>.</div>
  - name: Grant-level workflows
    description: |
      Grant-level workflows automatically send messages to certain users when a defined event is triggered. For example, if you want to send a confirmation message when a user schedules a booking, you can create a workflow that listens for [`booking.created` events](/docs/reference/notifications/#booking-created-notifications).

      Each workflow is linked to the grant specified in the [Create Workflow request](/docs/reference/api/grant-level-workflows/create-grant-workflow/).

      <div id="admonition-info">💡 <b>If you want to create workflows for a Nylas application, use the <a href="/docs/reference/api/application-level-workflows/">application-level workflows endpoints</a></b>.</div>
  - name: ExtractAI
    description: |
      **Nylas ExtractAI** allows you to connect to a user's email inbox and detect messages that match certain criteria. ExtractAI is currently available for online order tracking and delivery tracking, but you can apply it to many other scenarios.

      <div id="admonition-info">🔍 <b>ExtractAI is currently available for Nylas applications in the U.S. region only</b>.</div>

      ExtractAI uses the Order Consolidation endpoints to retrieve information about e-commerce order and tracking information from users' messages.

      ## ExtractAI documentation

      You can find more information about ExtractAI in the main documentation:

      - [Using ExtractAI](/docs/v3/extract-ai/)
      - [Using the Order Consolidation API](/docs/v3/extract-ai/order-consolidation-api/)
      - [ExtractAI and Order Consolidation API scopes](/docs/dev-guide/scopes/#order-consolidation-api-scopes)

      ## Order Consolidation scopes

      The table below lists the Order Consolidation endpoints and which scopes they require. The table shortens the full scope URI for space reasons, so add the prefix for the provider when requesting scopes.

      The ☑️ character indicates the most restrictive scope you can use for each provider.

      | Endpoint                                                                                                                 | Google Scopes</br>`https://www.googleapis.com/auth/...` | Microsoft Scopes</br>`https://graph.microsoft.com/...` |
      | :----------------------------------------------------------------------------------------------------------------------- | :------------------------------------------------------ | :----------------------------------------------------- |
      | **GET** `/v3/grants/<NYLAS_GRANT_ID>/consolidated-order`<br/>**GET** `/v3/grants/<NYLAS_GRANT_ID>/consolidated-shipment` | `/gmail.readonly` ☑️                                    | `Mail.Read` ☑️<br/>`Mail.Read.Shared`                  |

      For more information, see [Using scopes to request user data](/docs/dev-guide/scopes/).

      ## Extract AI notifications

      You can subscribe to the following triggers so Nylas notifies you about changes to your users' email inboxes:

      - `message.intelligence.order`
      - `message.intelligence.tracking`
      - `message.intelligence.return`

      For more information about the notification schema, see [ExtractAI notifications](/docs/reference/notifications/#extractai-notifications).
  - name: Configurations
    description: |
      A configuration is a collection of event settings and preferences. Nylas Scheduler stores Configuration objects in the Scheduler database and loads them as Scheduling Pages in the Scheduler UI.

      A configuration can be either private if it uses a session, or public if it does not. By default, Nylas creates public configurations (`requires_session_auth: false`). To create a private configuration, set `requires_session_auth` to `true`.

      After you create a private configuration, you can make a [`POST /v3/scheduling/sessions` request](/docs/reference/api/sessions/post-sessions/) that includes the Configuration object ID to create a session.

      ## Configurations scopes

      The table below lists the Configurations endpoints and which scopes they require. The table shortens the full scope URI for space reasons, so add the prefix for the provider when requesting scopes.

      The ☑️ in each column indicates the most restrictive scope you can request for each provider and still use that API. More permissive scopes appear under the minimum option. If you're already using one of the permissive scopes, you don't need to add the more restrictive scope.

      | Endpoint                                                                                            | Google Scopes</br>`https://www.googleapis.com/auth/...` | Microsoft Scopes</br>`https://graph.microsoft.com/...` |
      | :-------------------------------------------------------------------------------------------------- | :------------------------------------------------------ | :----------------------------------------------------- |
      | **POST** `/scheduling/configurations`</br>**PUT** `/scheduling/configuration/<SCHEDULER_CONFIG_ID>` | `/calendar.readonly` ☑️</br>`/calendar`                 | `Calendars.Read` ☑️</br>`Calendars.ReadWrite`          |

      For more information about scopes, see [Using scopes to request user data](/docs/dev-guide/scopes/).
  - name: Group Events
    description: |
      Group meetings let you host events with multiple participants. Unlike one-on-one meetings, group events are designed for collaborative scheduling where multiple attendees are invited to the same event.
  - name: Sessions
    description: |
      Nylas Scheduler uses session IDs to authorize requests to the [`/v3/scheduling/availability`](/docs/reference/api/availability/) and [`/v3/scheduling/bookings`](/docs/reference/api/bookings/) endpoints.

      When you create a session, you must include the ID of an existing [Configuration object](/docs/reference/api/configurations/). Sessions are only required for private configurations (`requires_session_auth: true`).

      ## Time to live

      For security purposes, Nylas recommends you set the `time_to_live` value for each session and refresh the sessions as they expire.
  - name: Availability
    description: |
      Nylas Scheduler uses the `/v3/scheduling/availability` endpoint to retrieve availability information. When you make a request, Nylas validates the provided session ID and uses it to retrieve the related Configuration object.

      ## Availability scopes

      The table below lists the Availability endpoints and which scopes they require. The table shortens the full scope URI for space reasons, so add the prefix for the provider when requesting scopes.

      The ☑️ in each column indicates the most restrictive scope you can request for each provider and still use that API. More permissive scopes appear under the minimum option. If you're already using one of the permissive scopes, you don't need to add the more restrictive scope.

      | Endpoint                           | Google Scopes</br>`https://www.googleapis.com/auth/...` | Microsoft Scopes</br>`https://graph.microsoft.com/...` |
      | :--------------------------------- | :------------------------------------------------------ | :----------------------------------------------------- |
      | **GET** `/scheduling/availability` | `/calendar.readonly` ☑️</br>`/calendar`                 | `Calendars.Read` ☑️</br>`Calendars.ReadWrite`          |

      For more information about scopes, see [Using scopes to request user data](/docs/dev-guide/scopes/).
  - name: Bookings
    description: |
      Nylas Scheduler uses the `/v3/scheduling/bookings` endpoint to manage bookings.

      ## Booking types

      Nylas Scheduler supports two booking types, `booking` and `organizer-confirmation`.

      `booking` represents a regular booking flow. When the booking type is `organizer-confirmation`, Nylas creates an event marked "Pending" in the organizer's calendar. It then sends an confirmation request email to the organizer, which includes a link to a page where the organizer can confirm or cancel the booking.

      ### Finalizing pending bookings

      The [`PUT /v3/scheduling/bookings/{booking_id}` request](/docs/reference/api/bookings/put-bookings-id/) allows the organizer to confirm or cancel a pending booking.

      ## Booking flow

      The Scheduling Component provides information about the selected time slot, and any additional information that the user added, to the [`/v3/scheduling/bookings` endpoint](/docs/reference/api/bookings/post-bookings/). The Bookings endpoint performs the following tasks:

      1. Validates the provided session ID and uses it to retrieve the related Configuration object.
      2. Confirms if the selected time slot is still available.
      3. Retrieves the booking participant's `grant_id`, using the list of participants' email addresses in the Configuration object.
      4. Creates an event.  
         If the booking type is set to `organizer-confirmation`, a placeholder event is created in the organizer's calendar.
      5. Creates a booking entry in the database and maps the provider's event ID and Scheduler's `booking_id`.
         If the booking type is set to `organizer-confirmation`, a booking entry with the `pending` status is created. The booking entry includes the placeholder event's `booking_id` and the `additional_fields` data provided in the request.
      6. Nylas creates a booking reference based on the configuration ID and the booking ID. You can use the booking reference to reschedule and cancel the event.
      7. (Optional) Emits a booking (`booking.created`) or a pending booking (`booking.pending`) webhook, depending on the booking type.

      ## Bookings scopes

      The table below lists the Bookings endpoints and which scopes they require. The table shortens the full scope URI for space reasons, so add the prefix for the provider when requesting scopes.

      The ☑️ in each column indicates the most restrictive scope you can request for each provider and still use that API. More permissive scopes appear under the minimum option. If you're already using one of the permissive scopes, you don't need to add the more restrictive scope.

      | Endpoint                                                                                                                             | Google Scopes</br>`https://www.googleapis.com/auth/...` | Microsoft Scopes</br>`https://graph.microsoft.com/...` |
      | :----------------------------------------------------------------------------------------------------------------------------------- | :------------------------------------------------------ | :----------------------------------------------------- |
      | **POST** `/scheduling/bookings`</br>**DELETE** `/scheduling/bookings/<BOOKING_ID>`</br>**PATCH** `/scheduling/bookings/<BOOKING_ID>` | `/calendar.events` ☑️</br>`/calendar`                   | `Calendars.ReadWrite` ☑️                               |

      For more information about scopes, see [Using scopes to request user data](/docs/dev-guide/scopes/).
  - name: App migration
    description: |
      Before you begin, you should already have:

      - Linked your v2 and v3 Nylas organizations. If you're not sure if your organizations are linked and you have a contract with us, [contact Nylas Support](/docs/support/#contact-nylas-support).
      - Created v3 applications to serve as the destinations for your v2 settings and connected account information.
      - [Set up equivalent provider auth apps as needed](/docs/v2/upgrade-to-v3/upgrade/auth/), especially if your users are authenticating with Microsoft.
      - [Set up v3 notification infrastructure](/docs/v2/upgrade-to-v3/upgrade/webhooks/). You'll use this to keep track of object that update while you're migrating your applications.

      You make Migration API requests using the v3 API route, using an API key from the destination v3 application.

      For each application to be migrated:

      1. [Link apps](#post-/v3/migration-tools/link-v2v3-apps)
      2. [Import app settings](#post-/v3/migration-tools/import-v2-app)
      3. [Migrate a test user](#post-/v3/migration-tools/grants/-account_id-/clone) and/or [Start a batch migration](#post-/v3/migration-tools/snapshot-batch-clone)

      <div id="admonition-warning"><strong>Make sure you use the correct region!</strong> In Nylas v3, you mange applications for both the U.S. and E.U. regions using the same Dashboard. If you're migrating a v2 application to a v3 one, make sure you create the v3 application in the correct region. </div>
  - name: Data migration
    description: |
      In Nylas v2, you used the unique Nylas ID to locate data and objects in Nylas's synced data. In Nylas v3, you use the provider ID directly. These APIs look up the provider IDs for your v2 data.

      Because every project is different, we leave it up to you to decide how your project updates the v2 IDs to v3 provider IDs.

      <div id="admonition-warning"><strong>These APIs are for one-time translation for migration purposes only.</strong> You can retry these APIs if you encounter issues, but they will be rate limited and you should not use them as part of your project's code or object handling logic.</div>

      Some data objects that exist in Nylas v2 may not have provider IDs available, meaning they do not exist on the provider. When this happens, Nylas returns the `v3_resource_id` as `None`.
  - name: v2 Redirects
    description: |
      Nylas Scheduler uses the `/v3/scheduling/should-redirect/<V2_SCHEDULER_SLUG>` endpoint to redirect existing v2 Scheduling Pages to v3.
paths:
  /v3/applications:
    get:
      operationId: get_application
      tags:
        - Applications
      summary: Get application
      description: Gets the application object
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request GET \
              --url 'https://api.us.nylas.com/v3/applications' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --header 'Content-Type: application/json'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            const applicationDetails = await nylas.applications.getDetails();

            console.log({ applicationDetails });
        - lang: python
          label: Python SDK
          source: |
            from nylas import Client

            nylas = Client(
                "<NYLAS_API_KEY>",
                "<NYLAS_API_URI>",
            )

            application = nylas.applications.info()
            application_id = application[1]
            print("Application ID:", application_id)
        - lang: ruby
          label: Ruby SDK
          source: |
            # frozen_string_literal: true

            # Load gems
            require 'nylas'

            # Initialize Nylas client
            nylas = Nylas::Client.new(
              api_key: '<NYLAS_API_KEY>'
            )

            application = nylas.applications.get_details()
            puts application
        - lang: java
          label: Java SDK
          source: |-
            import com.nylas.NylasClient;
            import com.nylas.models.*;

            public class getApplication {
              public static void main(String[] args) throws NylasSdkTimeoutError, NylasApiError {
                NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();
                Response<ApplicationDetails> application = nylas.applications().getDetails();
                
                System.out.println(application);
              }
            }
        - lang: kotlin
          label: Kotlin SDK
          source: |-
            import com.nylas.NylasClient

            fun main(args: Array<String>) {
              val nylas: NylasClient = NylasClient(
                  apiKey = "<NYLAS_API_KEY>"
              )

              val application = nylas.applications().getDetails()
              
              print(application)
            }
      security:
        - NYLAS_API_KEY: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: ID of the request
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/ApplicationObject'
          description: Returns Application object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
    patch:
      operationId: update_application
      tags:
        - Applications
      summary: Update an application
      description: |-
        Updates a Nylas application using the client ID associated with the specified API key.

        <div id="admonition-warning">⚠️ <b>This endpoint will be removed in the future when application settings are available in the Nylas Dashboard</b>.</div>

        When you make a `PATCH` request, Nylas replaces all data in the nested object with the information
        included in your request. For more information, see
        [Updating objects](/docs/reference/api/#updating-objects).
      x-code-samples:
        - lang: bash
          label: cURL
          source: |
            curl --request PATCH \
              --url 'https://api.us.nylas.com/v3/applications' \
              --header 'Content-Type: application/json' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --data '{
                "branding": {
                  "name": "<APPLICATION_NAME>",
                  "icon_url": "<ICON_URL>",
                  "website_url": "<WEBSITE_URL>",
                  "description": "<APPLICATION_DESCRIPTION>"
                },
                "hosted_authentication": {
                  "background_image_url": "<BACKGROUND_IMAGE_URL>",
                  "alignment": "<ALIGNMENT>",
                  "color_primary": "<COLOR_PRIMARY>",
                  "color_secondary": "<COLOR_SECONDARY>",
                  "title": "<TITLE>",
                  "subtitle": "<SUBTITLE>",
                  "background_color": "<BACKGROUND_COLOR>",
                  "spacing": 10
                },
                "callback_uris": [
                  {
                    "id": "<CALLBACK_URI_ID>",
                    "url": "<CALLBACK_URL>",
                    "platform": "<PLATFORM>",
                    "settings": {
                      "origin": "<ORIGIN>",
                      "bundle_id": "<BUNDLE_ID>",
                      "package_name": "<PACKAGE_NAME>",
                      "sha1_certificate_fingerprint": "<SHA1_FINGERPRINT>"
                    }
                  }
                ]
              }'
      security:
        - NYLAS_API_KEY: []
      requestBody:
        required: true
        description: ''
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationObject'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ApplicationObject'
          description: Returns application object
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404'
  /v3/applications/redirect-uris:
    get:
      operationId: get_all_callback_uris
      tags:
        - Applications
      summary: Get an application's callback URIs
      description: Returns a list of callback URIs for the specified Nylas application.
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request GET \
              --url 'https://api.us.nylas.com/v3/applications/redirect-uris' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --header 'Content-Type: application/json'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            const redirectUris = await nylas.applications.redirectUris.list();

            console.log("Redirect URIs:", redirectUris);
        - lang: python
          label: Python SDK
          source: |
            from nylas import Client

            nylas = Client(
                "<NYLAS_API_KEY>",
                "<NYLAS_API_URI>",
            )

            application_redirect_uris = nylas.applications.redirect_uris.list()
            print("Application Redirects:", application_redirect_uris.data)
        - lang: ruby
          label: Ruby SDK
          source: |
            # frozen_string_literal: true

            # Load gems
            require 'nylas'

            # Initialize Nylas client
            nylas = Nylas::Client.new(
              api_key: '<NYLAS_API_KEY>'
            )

            redirect_uris, _ = nylas.applications.redirect_uris.list

            redirect_uris.each do |uri|
              puts uri[:url]
            end
        - lang: java
          label: Java SDK
          source: |
            import com.nylas.NylasClient;
            import com.nylas.models.ListResponse;
            import com.nylas.models.NylasApiError;
            import com.nylas.models.NylasSdkTimeoutError;
            import com.nylas.models.RedirectUri;

            public class GetApplicationCallbackUris {
              public static void main(String[] args) throws NylasSdkTimeoutError, NylasApiError {
                NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();

                ListResponse<RedirectUri> redirectUris = nylas.applications().redirectUris().list();

                System.out.println("Redirect URIs: " + redirectUris.getData());
              }
            }
        - lang: kotlin
          label: Kotlin SDK
          source: |
            import com.nylas.NylasClient

            fun main() {
              val nylas = NylasClient(apiKey = "<NYLAS_API_KEY>")

              val redirectUris = nylas.applications().redirectUris().list()

              println("Redirect URIs: ${redirectUris.data}")
            }
      security:
        - NYLAS_API_KEY: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RedirectURIObject'
          description: Returns a list of callback URIs
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    $ref: '#/components/schemas/400'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: ID of the request
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  error:
                    $ref: '#/components/schemas/404'
    post:
      operationId: add_callback_uri
      tags:
        - Applications
      summary: Add callback URI to application
      description: |-
        Adds a callback URI to the specified Nylas application. Nylas uses callback URIs to redirect users
        to your project after they complete the authentication flow. If you don't specify a `platform`,
        Nylas defaults to `web`.

        The OAuth protocol requires that you include the `client_secret` field for calls made to this
        endpoint, depending on the `platform` you define. If you're using
        [OAuth 2.0 with PKCE](/docs/v3/auth/hosted-oauth-accesstoken/#create-grants-with-oauth-2.0-and-pkce)
        and your platform is `js`, `ios`, `android`, or `desktop`, the `client_secret` field is not
        required.
      security:
        - NYLAS_API_KEY: []
      requestBody:
        required: true
        description: ''
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              oneOf:
                - $ref: '#/components/schemas/webDesktopCallbackNoSettings'
                - $ref: '#/components/schemas/JsCallbackwSettings'
                - $ref: '#/components/schemas/iosCallbackwSettings'
                - $ref: '#/components/schemas/AndroidCallbackwSettings'
              discriminator:
                propertyName: platform
                mapping:
                  web: '#/components/schemas/webDesktopCallbackNoSettings'
                  desktop: '#/components/schemas/webDesktopCallbackNoSettings'
                  js: '#/components/schemas/JsCallbackwSettings'
                  ios: '#/components/schemas/iosCallbackwSettings'
                  android: '#/components/schemas/AndroidCallbackwSettings'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: ID of the request
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/RedirectURIObject'
          description: Returns callback URI
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/applications/redirect-uris' \
              --header 'Content-Type: application/json' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --data '{
                "platform": "web",
                "url": "<CALLBACK_URI>",
                "id": "<CALLBACK_URI_ID>"
              }'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            const redirectUri = await nylas.applications.redirectUris.create({
              requestBody: {
                url: "<CALLBACK_URI>",
                platform: "web",
              },
            });

            console.log("Redirect URI created:", redirectUri);
        - lang: python
          label: Python SDK
          source: |
            from nylas import Client

            nylas = Client(
                "<NYLAS_API_KEY>",
                "<NYLAS_API_URI>",
            )

            redirect_uri = nylas.applications.redirect_uris.create(
                request_body={
                    "url": "https://example.com/oauth/exchange",
                    "platform": "web",
                },
            )

            print("Created redirect URI:", redirect_uri)
        - lang: java
          label: Java SDK
          source: |
            import com.nylas.NylasClient;
            import com.nylas.models.CreateRedirectUriRequest;
            import com.nylas.models.NylasApiError;
            import com.nylas.models.NylasSdkTimeoutError;
            import com.nylas.models.Platform;
            import com.nylas.models.RedirectUri;
            import com.nylas.models.Response;

            public class CreateRedirectUri {
              public static void main(String[] args) throws NylasSdkTimeoutError, NylasApiError {
                NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();

                CreateRedirectUriRequest requestBody = new CreateRedirectUriRequest.Builder(
                    "<CALLBACK_URI>", Platform.WEB)

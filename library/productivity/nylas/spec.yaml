    response_object:
      description: Base response object for an ExtractAI result.
      type: object
      required:
        - id
        - grant_id
        - application_id
        - object
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/id'
        grant_id:
          $ref: '#/components/schemas/grant_id'
        application_id:
          type: string
          description: A reference to the parent Application object.
          example: ad410018-d306-43f9-8361-fa5d7b2172e0
        object:
          type: string
          description: The response object type.
          example: shipment
        created_at:
          type: integer
          description: The time when the object was created, in seconds using the Unix timestamp format.
        updated_at:
          type: integer
          description: The time when the object was last updated, in seconds using the Unix timestamp format.
    order:
      description: Order information detected by Nylas.
      type: object
      required:
        - order_id
        - purchase_date
        - merchant_name
        - merchant_domain
        - products
        - order_provider_message_ids
      properties:
        order_id:
          type: string
          description: The order ID generated from the merchant.
        purchase_date:
          type: string
          format: date
          description: The purchase date.
        currency:
          type: string
          description: The currency of the order.
        merchant_name:
          type: string
          description: The name of the merchant.
        merchant_domain:
          type: string
          description: The merchant's domain and top-level domain.
        order_total:
          type: number
          description: The total cost of the order from the order message.
        tax_total:
          type: number
          description: The total amount paid in tax from the order message.
        discount_total:
          type: number
          description: The total discount amount from the order message, if applicable.
        shipping_total:
          type: number
          description: The total cost of shipping from the order message.
        gift_card_total:
          type:
            - number
            - 'null'
          description: The total gift card amount credited, if applicable.
        products:
          type: array
          description: A list of products in the order. Nylas might return this as an empty array.
          items:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                description: The name of the product.
              image_url:
                type: string
                description: A URL that directs to an image of the product, or an image associated with the product.
              quantity:
                type: integer
                description: The quantity of the product that was ordered.
              unit_price:
                type: number
                description: The unit price of the product.
        order_provider_message_ids:
          type: array
          items:
            type: string
            description: The message ID from the merchant.
    status:
      description: The current status of a shipment.
      type: object
      required:
        - description
        - carrier_description
      properties:
        description:
          type: string
          description: A text description of the shipment status.
          example: delivered
        carrier_description:
          type: string
          description: A description of the status from the carrier.
          example: Delivered
    location:
      description: A geographic address associated with a shipment.
      type: object
      required:
        - city
        - postal_code
        - state_province_code
        - country_code
        - country_name
      properties:
        city:
          type: string
          description: The city
          example: San Francisco
        postal_code:
          type: string
          description: The postal code
          example: '94107'
        state_province_code:
          type: string
          description: The state or province code
          example: CA
        country_code:
          type: string
          description: The country code
          example: US
        country_name:
          type: string
          description: The country name
          example: United States
    package_activity:
      description: A tracking event for a shipped package.
      type: object
      required:
        - status
        - location
        - carrier_location
        - timestamp
      properties:
        status:
          $ref: '#/components/schemas/status'
        location:
          $ref: '#/components/schemas/location'
        carrier_location:
          type: string
          description: The location of the carrier.
        timestamp:
          type: integer
          description: The time when the activity occurred, in seconds using the Unix timestamp format.
    carrier_enrichment:
      description: Carrier and delivery details extracted from a shipment notification.
      type: object
      required:
        - delivery_date
        - delivery_estimate
        - delivery_status
        - package_activity
      properties:
        delivery_date:
          type: integer
          description: The date the shipment was delivered, in seconds using the Unix timestamp format.
        delivery_estimate:
          type: integer
          description: The estimated delivery date, in seconds using the Unix timestamp format.
        delivery_status:
          $ref: '#/components/schemas/status'
        ship_to_address:
          $ref: '#/components/schemas/location'
        package_activity:
          type: array
          items:
            $ref: '#/components/schemas/package_activity'
          description: A list of activities the shipment has undergone.
        service_type:
          type: string
          description: The type of service used to ship the package.
          example: Ground
        signature_required:
          type: boolean
          description: If `true`, indicates that a signature is required for the package.
          example: true
    shipment:
      description: The shipment information for an order.
      type: object
      properties:
        tracking_provider_message_ids:
          type: array
          items:
            type: string
            description: The message ID from the carrier.
        carrier_name:
          type: string
          description: The name of the carrier.
        tracking_number:
          type: string
          description: The tracking number.
        tracking_link:
          type: string
          description: The tracking link.
        carrier_enrichment:
          $ref: '#/components/schemas/carrier_enrichment'
          description: Live tracking information for a shipment.
        order:
          $ref: '#/components/schemas/order'
          description: The Order object associated with the shipment.
    return:
      description: Return information detected by Nylas.
      type: object
      properties:
        order:
          $ref: '#/components/schemas/order'
          description: The Order object associated with the return.
        refund_total:
          type: integer
          description: The total refund amount.
        return_provider_message_ids:
          type: array
          items:
            type: string
            description: The ID of the message associated with the return.
        returns_date:
          type: integer
          description: The date of the return, in seconds using the Unix timestamp format.
    template:
      type: object
      description: A custom message template.
      required:
        - body
        - created_at
        - engine
        - id
        - name
        - object
        - subject
        - updated_at
      properties:
        app_id:
          type:
            - string
            - 'null'
          description: |-
            The ID of the Nylas application associated with the template. Returned only if the template is
            configured at the application level.
          example: 6c45fe5e-0bb6-41b9-9acc-ccb15bfc51eb
        body:
          type: string
          description: The body content of the template, in HTML format.
          example: <p>Hello {{user.name}}, your booking has been confirmed.</p>
        created_at:
          type: integer
          description: When the template was created, in seconds using the Unix timestamp format.
          example: 1640995200
        engine:
          type: string
          enum:
            - handlebars
            - mustache
            - nunjucks
            - twig
          description: The templating engine.
          example: mustache
        grant_id:
          type:
            - string
            - 'null'
          description: |-
            The ID of the grant associated with the template. Returned only if the template is configured
            at the grant level.
          example: 6c45fe5e-0bb6-41b9-9acc-ccb15bfc51eb
        id:
          type: string
          description: The template ID.
          example: b79c82b2-a51b-4c54-8469-28006a43551a
        name:
          type: string
          description: The name of the template.
          example: Booking confirmed message
        object:
          type: string
          description: The object type identifier.
          default: template
          example: template
        subject:
          type: string
          description: The subject line of the template.
          example: '{{user.name}}, your booking is confirmed!'
        updated_at:
          type: integer
          description: When the template was last updated, in seconds using the Unix timestamp format.
          example: 1640995200
    400-2:
      description: Bad Request
      content:
        application/json:
          schema:
            title: error
            type: object
            properties:
              request_id:
                type: string
                description: The request ID.
              error:
                type: object
                description: The response error object.
                properties:
                  type:
                    type: string
                    description: The error type.
                  message:
                    type: string
                    description: The error message.
                  provider_error:
                    type: object
                    description: The error from the provider.
          examples:
            Bad Request:
              value:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
                error:
                  type: invalid_request_error
                  message: error parsing request body
                  provider_error:
                    code: TargetIdShouldNotBeMeOrWhitespace
                    message: Id is malformed.
            Invalid Idempotency-Key:
              value:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
                error:
                  type: api.invalid_idempotency_key
                  message: Idempotency-Key must be 256 characters or fewer.
    workflow:
      type: object
      description: A custom workflow that sends messages from a template when certain events are triggered.
      required:
        - date_created
        - delay
        - id
        - is_enabled
        - name
        - template_id
        - trigger_event
      properties:
        app_id:
          type:
            - string
            - 'null'
          description: |-
            The ID of the Nylas application associated with the workflow. Returned only if the
            workflow is configured at the application level.
          example: 6c45fe5e-0bb6-41b9-9acc-ccb15bfc51eb
        date_created:
          type: integer
          description: When the workflow was created, in seconds using the Unix timestamp format.
          example: 1756477389
        delay:
          type: integer
          description: |-
            The number of minutes between a `trigger_event` being met and the workflow sending
            a message.
          example: 5
        grant_id:
          type:
            - string
            - 'null'
          description: |-
            The ID of the grant associated with the workflow. Returned only if the workflow is
            configured at the grant level.
          example: 6c45fe5e-0bb6-41b9-9acc-ccb15bfc51eb
        id:
          type: string
          description: The ID of the workflow.
          example: b79c82b2-a51b-4c54-8469-28006a43551a
        is_enabled:
          type: boolean
          description: When `true`, indicates that the workflow is enabled.
          example: true
        name:
          type: string
          description: The name of the workflow.
          example: New booking confirmation workflow
        template_id:
          type: string
          description: The ID of the email template the workflow uses.
          example: 14c00cc8-648c-4381-ad10-52641d9bac8e
        trigger_event:
          type: string
          enum:
            - booking.cancelled
            - booking.created
            - booking.pending
            - booking.reminder
            - booking.rescheduled
          description: The event which triggers the workflow.
          example: booking.created
        from:
          type:
            - object
            - 'null'
          description: Details of the sender if the workflow uses transactional send.
          properties:
            email:
              type: string
              description: The email address of the sender.
              example: support@example.com
            name:
              type: string
              description: The name of the sender.
              example: Support
    configuration_appearance:
      title: appearance
      type: object
      description: Appearance settings definitions for the Scheduling Page.
      properties:
        your-key:
          type: string
          description: A key-value pair. For pre-defined keys for hosted Scheduling Pages, see [Styling options for hosted Scheduling Pages](/docs/v3/scheduler/customize-scheduler/#styling-options-for-hosted-scheduling-pages).
          maxLength: 550
    configuration_availability_open_hours:
      description: Open hours settings for a participant.
      type: object
      title: Open Hours
      examples: []
      properties:
        days:
          type: array
          description: The days of the week that the open hour settings are applied to. Sunday corresponds to `0`, and Saturday corresponds to `6`.
          items:
            type: integer
          example:
            - 0
            - 1
            - 2
        start:
          type: string
          minLength: 1
          description: The start time in 24-hour time format. Single-digit hours doesn't have a leading zero. The earliest start time is `0:00`, and the latest start time is `23:49`.
          example: '10:00'
        end:
          type: string
          minLength: 1
          description: The end time in a 24-hour time format. Single-digit hours doesn't have a leading zero.
          example: '14:00'
        exdates:
          type: array
          description: A list of dates that are excluded from the open hours. Dates should be formatted as `YYYY-MM-DD`.
          items:
            type: string
          example:
            - '2006-01-18'
    configuration_availability_rules:
      description: Availability rules for the scheduling configuration. These rules define how Nylas calculates availability for all participants.
      type: object
      properties:
        availability_method:
          description: The method that Nylas uses to calculate availability for all participants. For one-on-one meetings, the `availability_method` is always `collective`.
          type: string
          default: collective
          enum:
            - collective
            - max-fairness
            - max-availability
        buffer:
          type: object
          description: The amount of buffer time to add around existing meetings, in minutes. For example, if an account has a meeting scheduled from 10–11a.m., and you set a buffer of 30 minutes, Nylas treats 9:30–11:30a.m. as busy.
          $ref: '#/components/schemas/availability_buffer'
        default_open_hours:
          type: array
          description: A default set of open hours to apply to all participants. You can overwrite these open hours for individual participants by specifying `open_hours` on the participant object.
          items:
            $ref: '#/components/schemas/configuration_availability_open_hours'
        default_specific_time_availability:
          type: array
          description: |-
            Default specific date and time availability that applies to ALL participants in this configuration.
            These are merged with participant-specific entries, with participant entries taking precedence
            for the same date. Use this to define organization-wide special hours (e.g., holidays, events).
          items:
            type: object
            required:
              - date
              - start
              - end
            properties:
              date:
                type: string
                description: The date in YYYY-MM-DD format.
                example: '2025-12-25'
              start:
                type: string
                description: |-
                  The start time in HH:MM format (24-hour clock).
                  Use "00:00" with end "00:00" to mark the date as closed/unavailable.
                example: '09:00'
              end:
                type: string
                description: The end time in HH:MM format (24-hour clock).
                example: '13:00'
              timezone:
                type: string
                description: |-
                  The timezone for this specific date entry (e.g., "America/New_York").
                  Required when using default_specific_time_availability to ensure proper timezone conversion
                  across participants. When specified, `event_booking.timezone` must also be set.
                example: America/Toronto
        only_specific_time_availability:
          type: boolean
          description: |-
            When `true`, ALL participants will ONLY be available at times defined in `default_specific_time_availability`
            and their individual `specific_time_availability` entries. Regular `open_hours` and `default_open_hours`
            are completely ignored.

            This is useful for:
            - Temporary availability windows (e.g., hiring events, special booking periods)
            - Disabling all availability by setting to `true` with no specific dates defined

            **Note**: When set at the config level, individual participants cannot override this to `false`.
          default: false
          example: true
    configuration_availability:
      type: object
      description: The rules that determine the available time slots for the event.
      required:
        - duration_minutes
      properties:
        duration_minutes:
          type: integer
          description: The total number of minutes the event should last.
        interval_minutes:
          type: integer
          description: The interval between meetings. Nylas checks from the nearest interval of the passed `start_time`. For example, you schedule 30-minute meetings (`duration_minutes`) with 15 minutes between them (`interval_minutes`). If you have a meeting starting at 9:59, the API returns times starting at 10:00 (10:00-10:30, 10:15-10:45).
        round_to:
          type: integer
          default: 15
          description: Nylas rounds each time slot to the nearest `round_to` value. For example, if a time slot starts at 9:05a.m. and `round_to` is set to `15`, Nylas rounds it to 9:15a.m. Must be a multiple of 5 minutes.
        availability_rules:
          $ref: '#/components/schemas/configuration_availability_rules'
    configuration_event_booking:
      type: object
      required:
        - title
      properties:
        booking_type:
          type: string
          description: |-
            The booking type. If set to `booking`, Scheduler follows the
            [standard booking flow](/docs/v3/scheduler/customize-booking-flows/).

            If set to `organizer-confirmation`, Scheduler creates an event marked "Pending" in the organizer's
            calendar and sends a confirmation request email to the organizer. The confirmation request email
            includes a link to a page where the organizer can confirm or cancel the booking.
          enum:
            - booking
            - organizer-confirmation
          default: booking
          example: booking
        conferencing:
          $ref: '#/components/schemas/event_conferencing_request'
        description:
          type: string
          description: The description of the event.
          example: Come ready to talk philosophy!
        disable_emails:
          type:
            - boolean
            - 'null'
          description: |-
            When `true`, Nylas doesn't send email notifications when an event is booked, cancelled, or
            rescheduled. When `null`, the default behavior applies (emails are sent).
          default: false
          example: false
        hide_participants:
          type:
            - boolean
            - 'null'
          description: When `true`, Nylas creates the event with `hide_participants=true`, so the host can see who's on the event but the guests cannot. When `null`, the default behavior applies (participants are visible).
          default: false
          example: false
        location:
          type: string
          description: The location of the event.
          example: Central Library, room 203
        notify_participants:
          type:
            - boolean
            - 'null'
          description: |-
            When `true`, the calendar provider sends notifications to participants when the
            event is created, updated, or deleted. Microsoft grants ignore this flag and
            always notify participants. This field may be `null` if not explicitly set on
            the configuration; treat `null` the same as `false` (the default behavior).
          default: false
          example: true
        reminders:
          type: array
          required:
            - minutes_before_event
            - type
          items:
            type: object
            properties:
              email_subject:
                type: string
                description: (Email reminders only) The subject line of the email reminder.
                example: 'Reminder: Annual Philosophy Club Meeting'
              minutes_before_event:
                type: integer
                description: The number of minutes before the event to send the reminder.
                minimum: 1
                example: 30
              recipient:
                type: string
                description: (Email reminders only) Who should receive the reminder.
                enum:
                  - all
                  - host
                  - guest
                default: all
                example: host
              type:
                type: string
                description: The reminder type.
                enum:
                  - email
                  - webhook
                example: email
        timezone:
          type: string
          description: |-
            The timezone Nylas uses to display times in confirmation messages and reminders. This must be
            an [IANA-formatted string](https://en.wikipedia.org/wiki/Tz_database).
          minLength: 1
          example: America/Chicago
        title:
          type: string
          description: The title of the event.
          example: Annual Philosophy Club Meeting
    configuration_participants_availability:
      description: The availability data for the participant. If omitted, the participant is considered to be available at all times. At least one participant must have availability data.
      type: object
      required:
        - calendar_ids
      properties:
        calendar_ids:
          type: array
          description: A list of calendar IDs associated with the participant's email address. These calendars are used to check the participant's availability.
          items:
            type: string
        open_hours:
          type: array
          description: An array of objects for the participant's open hours. Nylas searches for free time slots within these open hours.
          items:
            $ref: '#/components/schemas/configuration_availability_open_hours'
    configuration_participants_booking:
      description: The booking data for the participant. If omitted, the participant is not included in the booked event. At least one participant must have booking data.
      type: object
      required:
        - calendar_id
      properties:
        calendar_id:
          type: string
          description: The calendar ID that the event is created in.
    configuration_participants_specific_time_availability:
      description: |-
        A specific date and time range when the participant is available.
        Use "00:00" for both start and end to explicitly mark a date as unavailable.
      type: array
      items:
        type: object
        required:
          - date
          - start
          - end
        properties:
          date:
            type: string
            description: The date in YYYY-MM-DD format.
            example: '2025-08-21'
          start:
            type: string
            description: |-
              The start time in HH:MM format (24-hour clock).
              Use "00:00" with end "00:00" to explicitly mark this date as unavailable.
            example: '09:00'
          end:
            type: string
            description: The end time in HH:MM format (24-hour clock).
            example: '17:00'
          timezone:
            type: string
            description: |-
              The timezone for this specific date (e.g., "America/New_York").
              Optional for participant-level entries. Uses the participant's timezone if not specified.
            example: America/Toronto
    configuration_participants:
      type: object
      description: List of participants for the scheduling Configuration.
      required:
        - availability
        - booking
        - email
      properties:
        availability:
          $ref: '#/components/schemas/configuration_participants_availability'
        booking:
          $ref: '#/components/schemas/configuration_participants_booking'
        email:
          type: string
          description: The participant's email address. The email address must be associated with a valid Nylas grant.
          example: nyla@example.com
        grant_id:
          type: string
          description: The participant's grant ID.
        is_organizer:
          type: boolean
          description: |-
            When `true`, indicates that the participant is the organizer of the event.

            For non-round-robin meetings, one of the participants must be specified as the organizer. For
            round-robin meetings, remove the `is_organizer` key/value pair or set `is_organizer` to `false`
            for all participants.
          default: false
          example: false
        name:
          type: string
          description: The participant's name.
          example: Nyla
        specific_time_availability:
          $ref: '#/components/schemas/configuration_participants_specific_time_availability'
        only_specific_time_availability:
          type: boolean
          description: |-
            When `true`, this participant will ONLY be available at times defined in their
            `specific_time_availability` entries. Their regular `open_hours` are ignored.

            If the config-level `availability_rules.only_specific_time_availability` is `true`,
            this participant-level setting cannot override it to `false`.

            Setting to `true` with an empty `specific_time_availability` array results in
            zero availability for this participant (useful for temporarily disabling someone).
          default: false
          example: true
        timezone:
          type: string
          description: |-
            The timezone in which the participant is located, as an
            [IANA-formatted](https://en.wikipedia.org/wiki/Tz_database) string. Nylas uses this when
            calculating the participant's open hours, and in email notifications.
          example: America/Toronto
    configuration_scheduler_additional_fields:
      description: The definitions for additional fields to be displayed in the Scheduler UI. Guest will see the additional fields on the Scheduling Page when they book an event.
      type: object
      required:
        - label
        - type
        - required
      properties:
        label:
          type: string
          description: The text label to be displayed in the Scheduler UI.
        type:
          type: string
          description: The field type. If set to `metadata`, the field does not appear on email notifications and booking forms.
          enum:
            - text
            - multi_line_text
            - email
            - phone_number
            - dropdown
            - date
            - checkbox
            - radio_button
            - metadata
        required:
          type: boolean
          description: Whether the field is required to be filled out by the guest when booking an event.
        default:
          type: string
          description: |-
            The default value for the field. 

            - For the `metadata` type, this field stores the default metadata value.
            - For other types, this field sets the default value in the form, which is pre-filled when a guest books an event.
        pattern:
          type: string
          description: A regular expression pattern that the value of the field must match.
        order:
          type: integer
          description: The order in which the field will be displayed in the Scheduler UI. Fields with lower order values will be displayed first.
        options:
          type: array
          description: A list of options for the `dropdown` or `radio_button` types. This field is required for the `dropdown` and `radio_button` types.
          items:
            type: string
    configuration_scheduler_email_template_booking_confirmed:
      description: Configurable settings specifically for booking confirmed emails.
      type: object
      properties:
        title:
          type: string
          description: The title to replace the default 'Booking Confirmed' title. This doesn't change the email subject line. Only visible in emails sent to guests.
        body:
          type: string
          description: The additional body to be appended after the default body. Only visible in emails sent to guests.
    configuration_scheduler_email_template:
      type: object
      description: Configurable settings for booking emails.
      properties:
        booking_confirmed:
          $ref: '#/components/schemas/configuration_scheduler_email_template_booking_confirmed'
        logo:
          type: string
          description: |-
            The URL of a custom logo that is displayed at the top of the booking email. Replaces the default
            Nylas logo. The URL needs to be publicly accessible.
        show_nylas_branding:
          type: boolean
          default: true
          description: When `true`, displays Nylas branding in the booking email.
    configuration_scheduler:
      type: object
      properties:
        additional_fields:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/configuration_scheduler_additional_fields'
        available_days_in_future:
          type: integer
          description: The number of days in the future that Scheduler is available for scheduling events.
          default: 30
        min_booking_notice:
          type:
            - integer
            - 'null'
          description: The minimum number of minutes in the future that a user can make a new booking. This field may be `null` if not explicitly set on the configuration; treat `null` the same as `60` (the default behavior).
          default: 60
        min_cancellation_notice:
          type: integer
          description: The minimum number of minutes before a booking can be cancelled.
          default: 0
        cancellation_policy:
          type: string
          description: A message about the cancellation policy to display to users when booking an event.
        rescheduling_url:
          type: string
          description: The URL used to reschedule bookings. This URL is included in confirmation messages.
        cancellation_url:
          type: string
          description: The URL used to cancel bookings. This URL is included in confirmation messages.
        organizer_confirmation_url:
          type: string
          description: |-
            The URL used to confirm or cancel pending bookings. This URL is included in booking request
            messages.
        confirmation_redirect_url:
          type: string
          description: The URL that Nylas redirects the user to when the booking is confirmed.
        hide_rescheduling_options:
          type: boolean
          description: If `true`, the option to reschedule an event is hidden in booking confirmations and email notifications.
          default: false
        hide_cancellation_options:
          type: boolean
          description: If `true`, the option to cancel an event is hidden in booking confirmations and email notifications.
          default: false
        hide_additional_guests:
          type: boolean
          description: Whether to hide the **Additional guests** field on the Scheduling Page. If `true`, guests cannot invite additional guests to the event.
          default: false
        notetaker_settings:
          type: object
          description: |-
            Settings for automatically adding a Notetaker bot to bookings created with this configuration.
            When enabled, Notetaker joins the meeting to record, transcribe, and optionally generate
            summaries and action items. Requires `event_booking.conferencing` to be configured.
          properties:
            enabled:
              type: boolean
              description: |-
                When `true`, automatically creates a Notetaker bot for bookings made with this configuration.
                The bot joins the meeting at the scheduled time to record and transcribe.
              default: false
              example: true
            show_ui_consent_message:
              type: boolean
              description: |-
                When `true`, displays a consent message in the Scheduler UI informing guests that the
                meeting will be recorded.
              default: true
              example: true
            notetaker_name:
              type: string
              description: |-
                The display name for the Notetaker bot that joins the meeting.
                Maximum 255 characters.
              default: Nylas Notetaker
              example: Sales Recording Bot
            meeting_settings:
              $ref: '#/components/schemas/meeting_settings'
        email_template:
          $ref: '#/components/schemas/configuration_scheduler_email_template'
    configuration:
      type: object
      required:
        - participants
        - availability
        - event_booking
      properties:
        appearance:
          description: |-
            An object that defines the appearance settings for the Scheduling Page. This field
            may be `null` if no appearance customization has been set.
          anyOf:
            - $ref: '#/components/schemas/configuration_appearance'
            - type: 'null'
        availability:
          $ref: '#/components/schemas/configuration_availability'
        event_booking:
          $ref: '#/components/schemas/configuration_event_booking'
        name:
          type: string
          description: The name of the Scheduling Page. If not defined, Nylas defaults to the organizer's name.
        participants:
          type: array
          description: |-
            A list of participants to be included in the scheduled event. All participants' email addresses
            must be associated with a valid Nylas grant.
          items:
            $ref: '#/components/schemas/configuration_participants'
        requires_session_auth:
          type:
            - boolean
            - 'null'
          description: |-
            When `true`, the scheduling [Availability](/docs/reference/api/availability/) and
            [Bookings](/docs/reference/api/bookings/) endpoints require a valid session ID to
            authenticate requests using the specified Configuration. This field may be `null`
            if not explicitly set on the configuration; treat `null` the same as `false`
            (the default behavior).
          default: false
        scheduler:
          $ref: '#/components/schemas/configuration_scheduler'
        slug:
          type:
            - string
            - 'null'
          description: |-
            The slug for the Configuration object. This is an optional, unique identifier. You can use the
            slug instead of the `configuration_id` when making requests to the Nylas Scheduling endpoints.
            Slugs are unique to each Nylas application. This field may be `null` if no slug has been set.
    group-configuration:
      type: object
      required:
        - group_booking
        - name
        - type
      properties:
        appearance:
          $ref: '#/components/schemas/configuration_appearance'
        group_booking:
          type: object
          description: Settings for the group booking.
          required:
            - calendar_id
          properties:
            booking_type:
              type: string
              description: |-
                The booking type. Group Configurations support `booking` only, and follow the
                [standard booking flow](/docs/v3/scheduler/customize-booking-flows/).
              default: booking
              example: booking
            calendar_id:
              type: string
              description: |-
                The ID of the calendar on which the group event is created. Nylas doesn't support read-only
                calendars.
              example: primary
            disable_emails:
              type:
                - boolean
                - 'null'
              description: |-
                When `true`, Nylas doesn't send email notifications when an event is booked, cancelled, or
                rescheduled. When `null`, the default behavior applies (emails are sent).
              default: false
              example: false
            reminders:
              type: array
              description: A list of reminders for the event.
              items:
                type: object
                required:
                  - minutes_before_event
                  - type
                properties:
                  email_subject:
                    type: string
                    description: (Email reminders only) The subject line for the email reminder.
                    example: 'Reminder: Your physiotherapy appointment'
                  minutes_before_event:
                    type: integer
                    description: The number of minutes before the event to send the reminder.
                    minimum: 1
                    example: 30
                  recipient:
                    type: string
                    description: (Email reminders only) Who should receive the email reminder.
                    enum:
                      - host
                      - guest
                    example: host
                  type:
                    type: string
                    description: The reminder type.
                    enum:
                      - email
                      - webhook
                    example: email
        name:
          type: string
          description: The name of the Scheduling Page.
          example: InPath Physiotherapy
        requires_session_auth:
          type:
            - boolean
            - 'null'
          description: |-
            When `true`, the [Availability](/docs/reference/api/availability/) and
            [Bookings](/docs/reference/api/bookings/) endpoints require a valid session ID to
            authenticate requests using the specified Configuration. This field may be `null`
            if not explicitly set on the configuration; treat `null` the same as `false`
            (the default behavior).
          default: false
          example: false
        scheduler:
          $ref: '#/components/schemas/configuration_scheduler'
        slug:
          type:
            - string
            - 'null'
          description: |-
            The slug for the Configuration object. This is an optional, unique identifier. You can use the
            slug instead of the `configuration_id` when making requests to the Nylas Scheduling endpoints.
            Slugs are unique to each Nylas application. This field may be `null` if no slug has been set.
        type:
          type: string
          description: |-
            The type of event supported by the Configuration. When set to `group`, enables access to the
            [Group Events endpoints](/docs/reference/api/group-events/) and functionality.
            Defaults to empty (`""`) for all existing Configurations.
          example: group
    group_event_participants:
      title: Group event participants
      type: object
      description: |-
        An array of participants to include in the event booking. If you don't specify at least
        one participant, Nylas uses the event organizer instead.
      required:
        - email
      properties:
        name:
          type: string
          description: The participant's name.
          example: Leyah Miller
        email:
          type: string
          description: The participant's email address.
          example: leyah@example.com
        is_organizer:
          type: boolean
          description: When `true`, indicates that the participant is the event organizer.
          default: false
          example: true
    group_event_recurrence:
      title: Group event recurrence settings
      type: array
      items:
        type: string
      description: |-
        An array of `RRULE` and `EXDATE` strings. Nylas includes this field only if the event is the main
        (master) event. See [RFC-5545](https://tools.ietf.org/html/rfc5545#section-3.8.5) for more details.
        You can use [this tool](https://jkbrzt.github.io/rrule/) to learn more about the `RRULE` spec.

        Events inherit their timezone from the `when` object. Nylas recommends that you use the `when`
        object to specify the event's start and end time.

        Provider specifics:
          - Virtual calendars don't support `DTSTART` or `TZID`.
          - iCloud accounts do _not_ support recurring events for group events
          - Microsoft Graph adds one day to the `UNTIL` date.
      example:
        - RRULE:FREQ=WEEKLY;BYDAY=MO
        - EXDATE:20210405T000000Z
    group_event:
      type: object
      required:
        - availability
        - event_booking
        - participants
        - when
      properties:
        capacity:
          type: integer
          description: (Not supported for EWS events) The maximum number of attendees allowed in the event.
          minimum: 1
          maximum: 500
          default: 10
          example: 50
        conferencing:
          $ref: '#/components/schemas/event_conferencing_request'
        description:
          type: string
          description: |-
            A brief description of the group event (for example, its agenda). Nylas might return the
            description as an HTML string, depending on how the provider formats it.

            For Google accounts, this field accepts a maximum of 8,192 characters.
          example: Come ready to talk philosophy!
        location:
          type: string
          description: |-
            The location of the group event (for example, a physical address or the name of a meeting
            room).
          maxLength: 255
          example: New York Public Library, Cave Room
        participants:
          type: array
          items:
            $ref: '#/components/schemas/group_event_participants'
        recurrence:
          $ref: '#/components/schemas/group_event_recurrence'
        reminders:
          type: array
          required:
            - type
            - minutes_before_event
          items:
            type: object
            properties:
              type:
                type: string
                description: The reminder type.
                enum:
                  - email
                  - webhook
                example: email
              minutes_before_event:
                type: integer
                description: The number of minutes before the event to send the reminder.
                minimum: 1
                example: 30
              recipient:
                type: string
                description: (Email reminders only) Who should receive the reminder.
                enum:
                  - host
                  - guest
                example: host
              email_subject:
                type: string
                description: (Email reminders only) The subject line of the email reminder.
                example: 'Reminder: Annual Philosophy Club Meeting'
        title:
          type: string
          description: The name of the event.
          maxLength: 1024
          example: Annual Philosophy Club Meeting
        when:
          type: object
          description: The time and duration of the event.
          oneOf:
            - $ref: '#/components/schemas/event_timespan'
            - title: Read-only object
              type: object
              description: Read-only placeholder. Returned only in responses.
              readOnly: true
    import-group-event-response:
      type: object
      properties:
        imported_events:
          type: array
          description: A list of event IDs representing successfully imported group events.
          items:
            type: object
            properties:
              event_id:
                type: string
                description: The group event ID.
                example: 5d3qmne77v32r8l4phyuksl2x
        import_failed:
          type: array
          description: A list of event IDs representing group events that Nylas couldn't import.
          items:
            type: object
            properties:
              event_id:
                type: string
                description: The group event ID.
                example: 5d3qmne77v32r8l4phyuksl2x
              reason:
                type: string
                description: The reason the event wasn't imported.
    booking_create:
      type: object
      required:
        - start_time
        - end_time
        - guest
      properties:
        start_time:
          type: integer
          description: The event's start time, in seconds using the Unix timestamp format.
        end_time:
          type: integer
          description: The event's end time, in seconds using the Unix timestamp format.
        participants:
          type: array
          description: An array of objects that include a list of participant email addresses from the Configuration object to include in the booking. If not provided, Nylas includes all participants from the Configuration object.
          items:
            type: object
            properties:
              email:
                type: string
                description: The participant's email address.
        guest:
          type: object
          description: Details about the guest that is creating the booking. The guest `name` and `email` are required.
          properties:
            email:
              type: string
              description: The guest's email address.
            name:
              type: string
              description: The guest's name.
        timezone:
          type: string
          description: |-
            The guest's timezone, used in email notifications. If not provided, Nylas uses the timezone from
            the [Configuration object](/docs/reference/api/configurations/).
        email_language:
          type: string
          description: The language of the guest email notifications.
          enum:
            - en
            - fr
            - de
            - es
            - nl
            - sv
            - ja
            - zh
          default: en
        additional_guests:
          type: array
          description: An array of objects that include a list of additional guest email addresses to include in the booking.
          items:
            type: object
            properties:
              email:
                type: string
                description: The additional guest's email address.
              name:
                type: string
                description: The additional guest's name.
        additional_fields:
          type: object
          description: A dictionary of additional field keys mapped to the values populated by the guest in the booking form.
          additionalProperties:
            type: string
          example:
            name: Dorothy Vaughan
            email_address: dorothy@example.com
    booking:
      type: object
      required:
        - booking_id
        - event_id
        - title
        - organizer
        - status
      properties:
        booking_id:
          type: string
          description: The unique ID of the booking.
        event_id:
          type: string
          description: The unique ID of the event object associated with the booking.
        title:
          type: string
          description: The title of the event.
        organizer:
          type: object
          description: The participant that is designated as the organizer of the event.
          properties:
            email:
              type: string
              description: The organizer's email address.
            name:
              type: string
              description: The organizer's name.
        status:
          type: string
          description: The current status of the booking.
          enum:
            - booked
            - pending
            - cancelled
        description:
          type: string
          description: The description of the event.
    booking_confirm:
      type: object
      required:
        - salt
        - status
      properties:
        salt:
          type: string
          description: The salt extracted from the booking reference embedded in the organizer confirmation link, encoded as a URL-safe base64 string (without padding).
        status:
          type: string
          description: The action to take on the pending booking.
          enum:
            - confirmed
            - cancelled
        cancellation_reason:
          type: string
          description: The reason that the booking is being cancelled.
    booking_update:
      type: object
      required:
        - start_time
        - end_time
      properties:
        start_time:
          type: string
          description: The event's start time, in seconds using the Unix timestamp format.
        end_time:
          type: string
          description: The event's end time, in seconds using the Unix timestamp format.
    booking_update_group:
      type: object
      required:
        - calendar_id
        - end_time
        - event_id
        - start_time
      properties:
        calendar_id:
          type: string
          description: The ID of the calendar to access.
          example: 7d93zl2palhxqdy6e5qinsakt
        end_time:
          type: integer
          description: The event's end time, in seconds using the Unix timestamp format.\
          example: 1661877792
        event_id:
          type: string
          description: The ID of the event to update.
          example: 5d3qmne77v32r8l4phyuksl2x
        master_event_id:
          type: string
          description: (Recurring events only) The ID of the master event.
          example: 5d3qmne77v32r8l4phyuksl2x
        start_time:
          type: integer
          description: The event's start time, in seconds using the Unix timestamp format.
          example: 1661874192
    MigrationJob:
      type: object
      additionalProperties: false
      required:
        - job_id
        - type
        - public_application_id
        - status
        - count_all
        - count_success
        - count_failed
        - count_warning
        - created_at
        - updated_at
      properties:
        job_id:
          type: string
          description: An identifier for the migration job.
          example: e19f8e1a-eb1c-41c0-b6a6-d2e59daf7f47
        type:
          type: string
          description: The type of job.
          enum:
            - snapshot
            - migration
          example: snapshot
        public_application_id:
          type: string
          description: The ID of v3 application this job is running for.
          example: e19f8e1a-eb1c-41c0-b6a6-d2e59daf7f47
        status:
          type: string
          description: |-
            The state of the job.

            - **Pending**: The job has been created, but not started. Batch clone runs only after the linked
            snapshot job is completed.
            - **Running**: The job is currently running.
            - **Completed**: The job has successfully finished all migrations.
            - **Failed**: _All_ migrations failed.
            - **Partial**: The job successfully migrated _some_ accounts, but some could not be migrated or were created as "placeholder" grants.
          enum:
            - pending
            - running
            - completed
            - failed
            - partial
          example: pending
        count_all:
          type: integer
          description: A total number of accounts to be migrated. The total is a sum of the successful and failed migrations.
          example: 20
        count_success:
          type: integer
          description: The number of accounts that were successfully migrated.
          example: 10
        count_failed:
          type: integer
          description: The number of accounts that were unable to migrate.
          example: 5
        count_warning:
          type: integer
          description: The number of accounts that were migrated as invalid grants ("placeholder" grant ready for re-authentication).
          example: 5
        created_at:
          type: integer
          description: The time when the job was created, in seconds using the Unix timestamp format.
          example: 1617817109
        updated_at:
          type: integer
          description: The time the job was updated, in seconds using the Unix timestamp format.
          example: 1617817109
        linked_job_id:
          type: string
          description: The bulk migration tool creates two separate jobs that run one after the other. This ID links them together.
          example: e19f8e1a-eb1c-41c0-b6a6-d2e59daf7f47
    translate_v2v3_id:
      type: object
      additionalProperties: false
      required:
        - v2_application_id
        - v2_account_id
        - resource_type
        - ids
      properties:
        v2_application_id:
          type: string
          description: The ID of the v2 Nylas application the connected account belongs to.
          example: defg12342l0mr39hmla2eabcd
        v2_account_id:
          type: string
          description: The ID of v2 connected account you are requesting translations for.
          example: 1kb392012l0mr39hmla2exnxu
        resource_type:
          type: string
          description: |-
            The names of the v2 resources you're requesting translations for.

            To request Gmail's "labels", include `folders`. (Nylas v3 consolidates folders and labels into
            one resource.)
          example: message
          enum:
            - messages
            - drafts
            - threads
            - contacts
            - contactgroups
            - events
            - calendars
            - folders
        translations:
          type: array
          description: |-
            A list of v2 Nylas IDs and their v3 Provider ID counterparts, according to the requested resource
            type and v2 connected account.
          items:
            type: object
            properties:
              v2_resource_id:
                type: string
                description: The v2 Nylas ID.
                example: 1kb392012l0mr39hmla2exnxu
              v3_resource_id:
                type: string
                description: The v3 Provider ID.
                example: 175ade7f22b0a2f4
        next_page_number:
          type: integer
          description: A page number for next set of results, if more results are available. This field does not appear if there are no more results.
          example: 2
  requestBodies:
    message_update:
      content:
        application/json:
          schema:
            title: Message Update payload
            type: object
            properties:
              starred:
                type: boolean
                description: Set to `true` to mark as starred; `false` to mark as not starred.
                example: true
              unread:
                type: boolean
                description: Set to `true` to mark as unread; `false` to mark as read.
                example: true
              folders:
                type: array
                items:
                  type: string
                description: The ID(s) of the folder(s) to apply, overwriting all folders previously associated with the message. Microsoft messages can be in a single folder only. Google allows a single message to appear in multiple folders.
                example:
                  - folder-1
                  - folder-2
              metadata:
                $ref: '#/components/schemas/metadata'
    messages-clean:
      content:
        application/json:
          schema:
            type: object
            properties:
              message_id:
                type: array
                items:
                  type: string
                description: An array of IDs for the messages Nylas will clean.
                example:
                  - 18df98cadcc8534a
                maxItems: 20
              ignore_links:
                type: boolean
                description: If `true`, removes link-related tags (`<a>`) from the message while keeping the text.
                example: true
                default: true
              ignore_images:
                type: boolean
                description: If `true`, removes images from the message.
                example: true
                default: true
              images_as_markdown:
                type: boolean
                description: |-
                  If `true`, converts images in the message to
                  [Markdown](https://en.wikipedia.org/wiki/Markdown). Can't be `false` when `html_as_markdown`
                  is `true`.
                example: true
                default: true
              ignore_tables:
                type: boolean
                description: |-
                  If `true`, removes table-related tags (`<table>`, `<th>`, `<td>`, `<tr>`) from the message
                  while keeping rows.
                example: true
                default: true
              remove_conclusion_phrases:
                type: boolean
                description: If `true`, removes phrases such as "Best" and "Regards" from the message signature.
                example: true
                default: true
              html_as_markdown:
                type: boolean
                description: |-
                  **This property is in beta**. If `true`, converts the message to
                  [Markdown](https://en.wikipedia.org/wiki/Markdown). Can't be `true` when
                  `images_as_markdown` is `false`.
                example: false
                default: false
    message_send:
      content:
        application/json:
          schema:
            type: object
            required:
              - to
            properties:
              attachments:
                type: array
                description: An array of files to be sent with the message.
                items:
                  type: object
                  properties:
                    content:
                      type: string
                      description: |-
                        The Base64-encoded file content. See
                        [Working with email attachments](/docs/v3/email/attachments/#attachment-schemas-and-size-limits)
                        for more information.
                      example: YXR0YWNoDQoNCi0tLS0tLS0tLS0gRm9yd2FyZGVkIG1lc3NhZ2UgL=
                    content_disposition:
                      type: string
                      description: |-
                        (Not supported for Microsoft and EWS) The content disposition of the file. Usually,
                        this is `inline` or `attachment`, followed by the file name.
                      example: attachment; filename="nylas_logo.png"
                    content_id:
                      type: string
                      description: |-
                        (Inline attachments only) The alphanumeric `cid` from the `<img>` tag in the HTML
                        message body. To avoid unexpected behavior in threads, make sure to use unique CIDs
                        across messages of a thread.
                      example: ce9b9547-9eeb-43b2-ac4e-58768bdf04e4
                    content_type:
                      type: string
                      description: |-
                        The
                        [MIME type](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types/Common_types)
                        of the file. This is used by the email client to determine how to display the
                        attachment.
                      minLength: 1
                      example: image/png
                    filename:
                      type: string
                      description: The file name.
                      minLength: 1
                      example: nylas_logo.png
              bcc:
                type: array
                description: A list of people BCC'd on the message.
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The name of the person BCC'd on the message.
                      example: Leyah Miller
                    email:
                      type: string
                      description: The email address of the person BCC'd on the message.
                      example: leyah@example.com
              body:
                type: string
                description: The HTML body of the message.
                example: Looking forward to seeing you!
              cc:
                type: array
                description: A list of people CC'd on the message.
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The name of the person CC'd on the message.
                      example: Kaveh
                    email:
                      type: string
                      description: The email address of the person CC'd on the message.
                      example: kaveh@example.com
              custom_headers:
                type: array
                description: An array of custom headers to add to the message.
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The header name.
                      example: Email-Campaign
                    value:
                      type: string
                      description: The header value.
                      example: meetings
              from:
                type: array
                items:
                  required:
                    - email
                  properties:
                    name:
                      type: string
                      description: The name of the user sending the message.
                      example: Nyla
                    email:
                      type: string
                      description: The email address of the user sending the message.
                      example: nyla@example.com
              is_plaintext:
                type: boolean
                description: When `true`, the message body is sent as plain text and the MIME data doesn't include the HTML version of the message. When `false`, the message body is sent as HTML.
                default: false
              metadata:
                $ref: '#/components/schemas/metadata'
              reply_to:
                type: array
                description: A list of people who should receive replies to the message by default.
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The name of the person who should receive replies to the message.
                      example: Leyah Miller
                    email:
                      type: string
                      description: The email address of the person who should receive replies to the message.
                      example: leyah@example.com
              reply_to_message_id:
                type: string
                description: |-
                  The ID of the message you're replying to. For Gmail and Microsoft Graph, this is the
                  message ID on the provider. For IMAP Send, this is the
                  [RFC822](https://datatracker.ietf.org/doc/html/rfc822#section-4.6.1) `Message-ID` header
                  of the message you're replying to.
              send_at:
                type: integer
                description: |-
                  The time when Nylas should send the message, in seconds using the Unix timestamp format. This time must be
                  at least one minute in the future from the time you make your request. You can schedule
                  a message to be sent up to 30 days in the future.
              subject:
                type: string
                description: The subject of the message.
                example: 'Reminder: Annual Philosophy Club Meeting'
              template:
                type: object
                description: The [template](/docs/reference/api/application-level-templates/) to use for the message. Can be overriden by the `body` and `subject` fields.
                properties:
                  id:
                    type: string
                    description: The template ID.
                    example: b79c82b2-a51b-4c54-8469-28006a43551a
                  strict:
                    type: boolean
                    description: |-
                      When `true`, Nylas returns an error if the template contains variables that aren't
                      defined in the `variables` object.
                    default: true
                    example: true
                  variables:
                    type: object
                    description: |-
                      A set of key/value pairs representing variables to substitute for values in the
                      template.
                    properties:
                      additionalProperties:
                        type: string
                    example:
                      user:
                        name: Leyah
                        surname: Miller
              to:
                type: array
                description: A list of people that the message will be sent to.
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The name of the person the message will be sent to.
                      example: Kim Townsend
                    email:
                      type: string
                      description: The email address of the person the message will be sent to.
                      example: kim@example.com
              tracking_options:
                type: object
                description: Tracking settings for the message. See [Track messages](/docs/v3/email/message-tracking/).
                properties:
                  opens:
                    type: boolean
                    description: |-
                      When `true`, enables
                      [message open tracking](/docs/v3/email/message-tracking/#message-open-tracking) on the
                      message. Nylas generates a
                      [`message.opened` webhook notification](/docs/reference/notifications/#message-opened-notifications)
                      when a participant first opens the message.
                    default: false
                  thread_replies:
                    type: boolean
                    description: |-
                      When `true`, enables
                      [thread replied tracking](/docs/v3/email/message-tracking/#thread-replied-tracking)
                      on the message. Nylas generates a
                      [`thread.replied` webhook notification](/docs/reference/notifications/#thread-replied-notifications)
                      when a participant replies to the thread.
                    default: false
                  links:
                    type: boolean
                    description: |-
                      When `true`, enables
                      [link clicked tracking](/docs/v3/email/message-tracking/#link-clicked-tracking) on the
                      message. Nylas generates a
                      [`message.link_clicked` webhook notification](/docs/reference/notifications/#link-clicked-notifications)
                      when a participant clicks a link in the message.
                    default: false
                  label:
                    type: string
                    description: |-
                      A brief description of the message, why it's being tracked, or the tracking options
                      enabled.
                    maxLength: 2048
              use_draft:
                type: boolean
                description: |-
                  (Google and Microsoft only) When `true`, Nylas saves the message in the user's Drafts folder
                  until its `send_at` time. This field can't be `true` if `send_at` is undefined.
                default: false
              signature_id:
                type: string
                description: |-
                  The ID of a [signature](/docs/v3/email/signatures/) to append to the message body. Nylas
                  inserts the signature after a line break at the end of the body, including after any quoted
                  text in replies and forwards. Only one signature can be used per message.
                example: sig_abc123

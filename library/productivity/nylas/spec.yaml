  /v3/connectors/{provider}/creds:
    post:
      operationId: create_credential
      tags:
        - Connector credentials
      summary: Create a credential
      description: Manually create a credential record.
      security:
        - NYLAS_API_KEY: []
      parameters:
        - $ref: '#/components/parameters/provider'
      requestBody:
        required: true
        description: ''
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Connector Override
                  description: Override the default connector with another auth app.
                  required:
                    - name
                    - credential_type
                    - credential_data
                  properties:
                    name:
                      type: string
                      description: The name of the credential. Must be unique.
                      example: Google auth app \#2 multitenant
                    credential_type:
                      type: string
                      description: The type of the credential. Set this value to `connector` if you have multiple provider auth applications for a single provider and need to create an override credential.  </br></br> For example, if you have two Google provider auth apps, the Google connector for each application can only connect to one of those Google auth apps by default. You can set up a connector override credential, however, then specify that credential ID in authentication requests so that the request goes through the Google connector, but goes to the non-default Google auth app.
                      example: connector
                    credential_data:
                      type: object
                      description: |-
                        An object that contains special information that must be included in the credential.
                        This information is securely encrypted and stored, and isn't visible to users.

                        You must include data such as the `client_id` and `client_secret` for the provider
                        auth application.
                      example:
                        client_id: 3805ABCD1234-ABCD1234uv02m.apps.googleusercontent.com
                        client_secret: Ilg....01pe8db
                - type: object
                  title: Service Account
                  description: Service account credential for Google App Permission.
                  required:
                    - name
                    - credential_type
                    - credential_data
                  properties:
                    name:
                      type: string
                      description: The name of the credential. Must be unique.
                      example: My first Google credential
                    credential_type:
                      type: string
                      description: The type of the credential. For the App Permission flow (currently supported for [Google App Permission](/docs/v3/auth/bulk-auth-grants/#google-app-permission-via-nylas) only), the type must be `serviceaccount`.
                      example: serviceaccount
                    credential_data:
                      type: object
                      description: An object that specifies some special information required for the credential. This information is securely encoded and stored, and is _not_ visible to end users. </br></br> For the [Google App Permission flow](/docs/v3/auth/bulk-auth-grants/#google-app-permission-via-nylas), this field must contain the `private_key_id`, `private_key`, and `client_email`.
                      example:
                        type: service_account
                        project_id: marketplace-sa-test
                        private_key_id: abcd1234defg5678
                        private_key: |
                          -----BEGIN PRIVATE KEY-----
                          ...
                          -----END PRIVATE KEY-----
                        client_email: some-name@marketplace-sa-test.iam.gserviceaccount.com
                        client_id: '123456789'
                        auth_uri: https://accounts.google.com/o/oauth2/auth
                        token_uri: https://oauth2.googleapis.com/token
                        auth_provider_x509_cert_url: https://www.googleapis.com/oauth2/v1/certs
                        client_x509_cert_url: https://www.googleapis.com/robot/v1/metadata/x509/some-name%40marketplace-sa-test.iam.gserviceaccount.com
                - type: object
                  title: Admin Consent
                  description: Admin consent credential for Microsoft bulk auth.
                  required:
                    - name
                    - credential_type
                    - credential_data
                  properties:
                    name:
                      type: string
                      description: The name of the credential. Must be unique.
                      example: My Microsoft Admin Consent credential
                    credential_type:
                      type: string
                      description: The type of the credential. For the [Microsoft Admin Consent flow](/docs/v3/auth/bulk-auth-grants/#use-a-microsoft-bulk-authentication-grant), the type must be `adminconsent`.
                      example: adminconsent
                    credential_data:
                      type: object
                      description: |-
                        An object that specifies some special information required for the credential.
                        This information is securely encoded and stored, and isn't visible to users.

                        For the Microsoft Admin Consent 2.0 flow, this field must contain the `tenant`
                        (either yours or the user's). If you don't specify the Azure `client_id` and
                        `client_secret` Nylas uses the information from your Nylas application's
                        Microsoft connector.
                      example:
                        client_id: 2f70ABCD-1234-ABCD-1234-ABCD0316be16
                        client_secret: yhg7.....6BoK4j
                        tenant: 2f70ABCD-5678-DEFG-5678-ABCD0316be16
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/CredentialObject'
          description: The credential is created.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400'
        '401':
          description: Not Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401'
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/connectors/<CONNECTOR>/creds' \
              --header 'Content-Type: application/json' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY>' \
              --data '{
                "name": "CONNECTOR",
                "credential_type": "connector",
                "credential_data": {
                  "client_id": "<CLIENT_ID>",         // PROVIDER_CLIENT_ID or NYLAS_CLIENT_ID, depending on credential type.
                  "client_secret": "<CLIENT_SECRET>"  // PROVIDER_CLIENT_SECRET or NYLAS_CLIENT_SECRET, depending on credential type.
                }
              }'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas, { CredentialType } from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            const credential = await nylas.connectors.credentials.create({
              provider: "google",
              requestBody: {
                name: "Google connector override",
                credentialType: CredentialType.CONNECTOR,
                credentialData: {
                  client_id: "<CLIENT_ID>",
                  client_secret: "<CLIENT_SECRET>",
                },
              },
            });

            console.log("Credential created:", credential);
        - lang: python
          label: Python SDK
          source: |
            from nylas import Client

            nylas = Client(
                "<NYLAS_API_KEY>",
                "<NYLAS_API_URI>",
            )

            credential = nylas.connectors.credentials.create(
                provider="google",
                request_body={
                    "name": "Google connector override",
                    "credential_type": "connector",
                    "credential_data": {
                        "client_id": "<CLIENT_ID>",
                        "client_secret": "<CLIENT_SECRET>",
                    },
                },
            )

            print("Created credential:", credential)
        - lang: java
          label: Java SDK
          source: |
            import com.nylas.NylasClient;
            import com.nylas.models.AuthProvider;
            import com.nylas.models.Credential;
            import com.nylas.models.CreateCredentialRequest;
            import com.nylas.models.CredentialData;
            import com.nylas.models.NylasApiError;
            import com.nylas.models.NylasSdkTimeoutError;
            import com.nylas.models.Response;

            public class CreateCredential {
              public static void main(String[] args) throws NylasSdkTimeoutError, NylasApiError {
                NylasClient nylas = new NylasClient.Builder("<NYLAS_API_KEY>").build();

                CredentialData.ConnectorOverride credentialData = new CredentialData.ConnectorOverride(
                    "<CLIENT_ID>", "<CLIENT_SECRET>", null);

                CreateCredentialRequest requestBody = new CreateCredentialRequest.Connector(
                    "Google connector override", credentialData);

                Response<Credential> credential = nylas.connectors().credentials()
                    .create(AuthProvider.GOOGLE, requestBody);

                System.out.println("Credential created: " + credential.getData());
              }
            }
        - lang: kotlin
          label: Kotlin SDK
          source: |
            import com.nylas.NylasClient
            import com.nylas.models.AuthProvider
            import com.nylas.models.CreateCredentialRequest
            import com.nylas.models.CredentialData

            fun main() {
              val nylas = NylasClient.Builder("<NYLAS_API_KEY>").build()

              val credentialData = CredentialData.ConnectorOverride(
                  clientId = "<CLIENT_ID>",
                  clientSecret = "<CLIENT_SECRET>")

              val requestBody = CreateCredentialRequest.Connector(
                  name = "Google connector override",
                  credentialData = credentialData)

              val credential = nylas.connectors().credentials().create(AuthProvider.GOOGLE, requestBody)

              println("Credential created: ${credential.data}")
            }

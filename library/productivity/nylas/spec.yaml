                  Updated HTML content for the signature. Maximum 100 KB. Images must use externally hosted
                  URLs (base64 inline images are not supported). Nylas sanitizes the HTML on input to prevent
                  malicious content.
                example: <div><p><strong>Nick Barraclough</strong></p><p>Senior Product Manager | Nylas</p></div>
          example:

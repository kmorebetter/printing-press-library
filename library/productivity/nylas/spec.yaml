    import_group_event:
      description: Import group event
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
                - calendar_id
                - event_id
              properties:
                calendar_id:
                  type: string
                  description: The ID of the calendar to access.
                  example: primary
                capacity:
                  type: number
                  description: |-
                    The maximum number of attendees allowed in the event. If not specified, Nylas uses the
                    default capacity for your Configuration.
                  minimum: 1
                  maximum: 500
                  default: 10
                  example: 50
                event_id:
                  type: string
                  description: ID of the event to import.
                  example: 5d3qmne77v32r8l4phyuksl2x
                exceptions:
                  type: array
                  description: An array of events to create exceptions for.
                  items:
                    type: object
                    properties:
                      capacity:
                        type: number
                        description: |-
                          The maximum number of attendees allowed in the event. You must specify a `capacity`
                          for all events in `exceptions`.
                        example: 5
                      event_id:
                        type: string
                        description: ID of the to create an exception for.
                        example: 5d3qmne77v32r8l4phyuksl2x
                participants:
                  type: array
                  description: |-
                    An array of participants to include in the event booking. If you don't specify at least
                    one participant, Nylas uses the event organizer instead.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: The participant's full name.
                        example: Leyah Miller
                      email:
                        type: string
                        description: The participant's email address.
                        example: leyah@example.com
    validate_timeslot:
      description: Validate time slot
      content:
        application/json:
          schema:
            type: object
            required:
              - calendar_id

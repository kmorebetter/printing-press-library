  /v3/rules:
    post:
      summary: Create a rule
      tags:
        - Rules
      operationId: create-rule
      x-beta: true
      description: |-
        Creates a rule for your application. A rule defines a `trigger` (`inbound` or `outbound`), conditions against
        sender or recipient fields, and actions to apply when the conditions match. Inbound rules run on incoming
        messages; outbound rules run on sends before they're submitted to the email provider. Inbound and outbound
        rules are isolated — inbound rules never run during sends, and outbound rules never run on message receipt.

        Inbound rules can match `from.address`, `from.domain`, or `from.tld`. Outbound rules can match
        `from.address`, `from.domain`, `from.tld`, `recipient.address`, `recipient.domain`, `recipient.tld`, or
        `outbound.type` (`compose` or `reply`). Link inbound rules to a policy to apply them to specific Agent
        Accounts. Outbound rules are currently evaluated from the sending application's enabled outbound rules.

        The `application_id` and `organization_id` are derived from your API key and are read-only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - match
                - actions
              properties:
                name:
                  type: string
                  description: A human-readable name for the rule.
                  example: Block spam domains
                description:
                  type: string
                  example: Rejects messages from known spam domains at the SMTP level.
                priority:
                  type: integer
                  minimum: 0
                  maximum: 1000
                  default: 10
                  example: 1
                enabled:
                  type: boolean
                  default: true
                  example: true
                trigger:
                  type: string
                  enum:
                    - inbound
                    - outbound
                  default: inbound
                  description: |-
                    When the rule is evaluated. `inbound` runs the rule on incoming messages; `outbound` runs the rule
                    on sends before they're submitted to the email provider. Inbound rules accept only `from.*`
                    conditions. Outbound rules accept `from.*`, `recipient.*`, and `outbound.type`.
                  example: inbound
                match:
                  type: object
                  required:
                    - conditions
                  properties:
                    operator:
                      type: string
                      enum:
                        - any
                        - all
                      description: Optional. When omitted, the rule defaults to `all`.
                      example: any
                    conditions:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required:
                          - field
                          - operator
                          - value
                        properties:
                          field:
                            type: string
                            enum:
                              - from.address
                              - from.domain
                              - from.tld
                              - recipient.address
                              - recipient.domain
                              - recipient.tld
                              - outbound.type
                            description: |-
                              The field to match against. `from.*` fields match the normalized sender address,
                              domain, or top-level domain. Inbound rules accept only `from.*`. Outbound rules also
                              accept `recipient.*` and `outbound.type`. For outbound rules, `recipient.*` matches
                              against any recipient — To, CC, BCC, and SMTP envelope recipients. `outbound.type`
                              classifies the send as `compose` (new message) or `reply` (replying to an existing
                              thread).
                            example: from.domain
                          operator:
                            type: string
                            enum:
                              - is
                              - is_not
                              - contains
                              - in_list
                            description: |-
                              How to compare the field value. `outbound.type` supports only `is` and `is_not`;
                              `contains` and `in_list` are rejected for that field.
                            example: is
                          value:
                            oneOf:
                              - type: string
                              - type: array
                                items:
                                  type: string
                            description: |-
                              The value to compare against. For `in_list`, pass an array of List IDs. For
                              `outbound.type`, pass `compose` or `reply` (case is normalized to lowercase).
                            example: spam-domain.com
                actions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - type
                    properties:
                      type:
                        type: string
                        enum:
                          - block
                          - mark_as_spam
                          - assign_to_folder
                          - mark_as_read
                          - mark_as_starred
                          - archive
                          - trash
                        example: block
                      value:
                        type: string
                        description: Required when `type` is `assign_to_folder`.
      x-code-samples:
        - lang: bash
          label: cURL
          source: |
            curl -X POST "https://api.us.nylas.com/v3/rules" \
              -H "Authorization: Bearer <NYLAS_API_KEY>" \
              -H "Content-Type: application/json" \
              -d '{
                "name": "Block spam domains",
                "priority": 1,
                "trigger": "inbound",
                "match": {
                  "operator": "any",
                  "conditions": [
                    {
                      "field": "from.domain",
                      "operator": "is",
                      "value": "spam-domain.com"
                    }
                  ]
                },
                "actions": [
                  { "type": "block" }
                ]
              }'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({

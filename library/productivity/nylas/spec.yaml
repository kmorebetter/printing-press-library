  /v3/connectors:
    post:
      operationId: create_connector
      tags:
        - Connectors (Integrations)
      summary: Create a connector
      description: |-
        Create a connector in your Nylas application.

        Connectors are how your Nylas application stores information it needs to connect to external
        services. Creating a connector is the first step in setting up authentication for your project.
        See [Supported providers](/docs/provider-guides/#supported-providers) for more information.
      security:
        - NYLAS_API_KEY: []
      requestBody:
        required: true
        description: ''
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Google
                  description: Google connector. Requires GCP OAuth app credentials.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: The provider type. For Google providers, set to `google`.
                      example: google
                    settings:
                      type: object
                      description: GCP provider auth app credentials and settings.
                      required:
                        - client_id
                        - client_secret
                      properties:
                        client_id:
                          type: string
                          description: The GCP app's client ID.
                          example: abc-def
                        client_secret:
                          type: string
                          description: The GCP app's client secret.
                          example: xyz-abc-def
                        topic_name:
                          type: string
                          description: Google Pub/Sub topic name. Required if using Email webhooks.
                          example: topic-123
                    scope:
                      type: array
                      items:
                        type: string
                      description: Set the default scopes for each connector. These scopes are overridden by scopes set on the specific grant.
                      example:
                        - https://www.googleapis.com/auth/userinfo.email
                        - https://www.googleapis.com/auth/userinfo.profile
                        - https://www.googleapis.com/auth/gmail.readonly
                - type: object
                  title: Microsoft
                  description: Microsoft connector. Requires Azure OAuth app credentials.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: The provider type. For Microsoft providers, set to `microsoft`.
                      example: microsoft
                    settings:
                      type: object
                      description: Your Azure provider auth app credentials and settings, as stored in Entra ID.
                      required:
                        - client_id
                        - client_secret
                      properties:
                        client_id:
                          type: string
                          description: The Azure auth app's client ID.
                          example: abc-def
                        client_secret:
                          type: string
                          description: The Azure auth app's client secret.
                          example: xyz-abc-def
                        tenant:
                          type: string
                          description: Microsoft tenant ID.
                          example: abc-123-def-456
                    scope:
                      type: array
                      items:
                        type: string
                      description: |-
                        Set the default scopes for each connector. Scopes set on individual grants override these scopes.
                        For Microsoft Graph connectors, the Nylas API accepts both the full URI version of a scope name (for example, `https://graph.microsoft.com/Calendars.Read`), as well as the short form (for example, `Calendars.Read`).
                      example:
                        - User.Read
                        - Mail.Read
                - type: object
                  title: Zoom
                  description: Zoom connector for managing meetings on behalf of users.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: The provider type. For Zoom providers, set to `zoom`.
                      example: zoom
                    settings:
                      type: object
                      description: |-
                        Zoom provider credentials and settings. You can copy them from your [Zoom App](https://developers.zoom.us/docs/zoom-apps/) in [Zoom Developer Platform](https://developers.zoom.us/docs/). The Zoom Nylas connector does not support default scopes, so do not include them in the connector request.

                        However, you must configure the required [granular scopes](https://developers.zoom.us/docs/integrations/oauth-scopes-granular/) directly on your Zoom OAuth app. To use Zoom conferencing with Nylas events, your Zoom app needs: `meeting:write:meeting` (create), `meeting:update:meeting` (update), and `meeting:delete:meeting` (delete).
                      required:
                        - client_id
                        - client_secret
                      properties:
                        client_id:
                          type: string
                          description: The Zoom app's client ID.
                          example: abc-def
                        client_secret:
                          type: string
                          description: The Zoom app's client secret.
                          example: xyz-abc-def
                - type: object
                  title: iCloud
                  description: iCloud connector. No app credentials required.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: |-
                        The provider type, in this case `icloud`. See
                        [Authenticating iCloud accounts](/docs/provider-guides/icloud/) for more
                        information.
                      example: icloud
                - type: object
                  title: IMAP
                  description: IMAP connector for generic IMAP/SMTP mail servers.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: |-
                        The provider type, in this case `imap`. See
                        [Using IMAP accounts and data](/docs/provider-guides/imap/) for more information.
                      example: imap
                - type: object
                  title: EWS
                  description: EWS connector for Exchange on-premises servers.
                  required:
                    - provider
                    - settings
                  properties:
                    provider:
                      type: string
                      description: |-
                        The provider type (in this case, `ews`). See
                        [Authenticating Exchange on-premises accounts](/docs/provider-guides/exchange-on-prem/)
                        for more information.
                      example: ews
                    scopes:
                      type: string
                      description: Scopes settings tell Nylas to request specific data objects from the provider.
                      enum:
                        - ews.messages
                        - ews.calendar
                        - ews.contacts
                      examples:
                        - ews.messages
                        - ews.calendar
                        - ews.contacts
                - type: object
                  title: Virtual calendars
                  description: Nylas-managed virtual calendar. No external provider.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: The provider type. For virtual calendars, set to `virtual-calendar`.
                      example: virtual-calendar
                - type: object
                  title: Yahoo
                  description: Yahoo connector. Requires Yahoo OAuth app credentials.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: |-
                        The provider type (in this case, `yahoo`). See
                        [Authenticating Yahoo accounts](/docs/provider-guides/yahoo/) for more information.
                      example: yahoo
                    settings:
                      type: object
                      description: Yahoo provider credentials.
                      required:
                        - client_id
                        - client_secret
                      properties:
                        client_id:
                          type: string
                          description: The Yahoo app's client ID.
                          example: abc-def
                        client_secret:
                          type: string
                          description: The Yahoo app's client secret.
                          example: xyz-abc-def
                    scope:
                      type: array
                      items:
                        type: string
                      description: Set the default scopes for each connector. These scopes are overridden by scopes set on the specific grant.
                      example:
                        - email
                        - profile
                        - mail-w
                - type: object
                  title: Inbox (Beta)
                  description: Nylas-managed mail provider connector. Currently in beta.
                  required:
                    - provider
                  properties:
                    provider:
                      type: string
                      description: The provider type (in this case, `inbox`). **This provider is currently in beta.**
                      example: inbox
                    scope:
                      type: array
                      items:
                        type: string
                      description: Set the default scopes for each connector. These scopes are overridden by scopes set on the specific grant.
                      example:
                        - message.read
                        - message.modify
                        - message.send
      responses:
        '201':
          description: Connector Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: ID of the request.
                    example: 5967ca40-a2d8-4ee0-a0e0-6f18ace39a90
                  data:
                    $ref: '#/components/schemas/ConnectorObject'
        '400':

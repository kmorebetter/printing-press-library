  /v3/admin/applications/{application_id}/api-keys:
    parameters:
      - in: path
        schema:
          type: string
        name: application_id
        required: true
        description: ID of the Nylas application to access.
      - in: header
        name: X-Nylas-Signature
        schema:
          type: string
        required: true
        description: |-
          A Base64-encoded signature using your private key's RSA with a 2048-bit key and an SHA-256 hashed
          string of the path, method, timestamp, nonce, and payload.
      - in: header
        name: X-Nylas-Kid
        schema:
          type: string
        required: true
        description: The `private_key_id` from your Service Account JSON file.
      - in: header
        name: X-Nylas-Nonce
        schema:
          type: string
        required: true
        description: |-
          A randomly generated nonce. Each request needs to have a unique nonce. If you try to reuse a
          nonce, Nylas rejects the request.
      - in: header
        name: X-Nylas-Timestamp
        schema:
          type: number
        required: true
        description: |-
          The time when you submit your request, in seconds using the Unix timestamp format. This timestamp should fall within
          a 5-minute window of your real request time.
    post:
      summary: Create API key
      tags:
        - Manage API keys
      operationId: create-api-key
      x-beta: true
      description: |-
        <div id="admonition-warning">⚠️ <b>Before you can use the Manage API Keys endpoints, you need to <a href="/docs/reference/api/manage-api-keys/">create a Nylas Service Account</a></b>.</div>

        Creates an API key for the specified Nylas application.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: A short, descriptive name for the API key.
                  example: example-key
                expires_in:
                  type: number
                  description: How long the API key will be valid, in days.
                  example: 3600
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl -X POST "https://api.us.nylas.com/v3/admin/applications/<NYLAS_APPLICATION_ID>/api-keys" \
              -H "Content-Type: application/json" \
              -H "X-Nylas-Signature: <BASE64_SIGNATURE>" \
              -H "X-Nylas-Kid: <SERVICE_ACCOUNT_ID>" \
              -H "X-Nylas-Nonce: <NONCE>" \
              -H "X-Nylas-Timestamp: 1676412353123" \
              -d '{
                "name": "example-key",
                "expires_in": 3600
              }'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: ID of the request.
                    example: 5fa64c92-e840-4357-86b9-2aa364d35b88
                  data:
                    type: object
                    properties:
                      api_key:
                        type: string
                        description: The API key.
                        example: <NYLAS_API_KEY>
                      application_id:
                        type: string
                        description: The application ID associated with the API key.
                        example: ad410018-d306-43f9-8361-fa5d7b2172e0
                      created_at:
                        type: number
                        description: When the API key was created, in seconds using the Unix timestamp format.
                        example: 1742932766
                      expires_at:
                        type: number
                        description: When the API key will expire, in seconds using the Unix timestamp format.
                        example: 1753300766
                      id:
                        type: string
                        description: The API key ID.
                        example: <NYLAS_API_KEY_ID>
                      name:
                        type: string
                        description: The name of the API key.
                        example: example-key
                      permissions:
                        type: array
                        description: The scopes assigned to the API key.
                        example:
                          - apikey.create
                          - apikey.get
                          - apikey.delete
                      status:
                        type: string
                        description: The status of the API key.
                        example: active
                      updated_at:
                        type: number
                        description: |-
                          When the API key was last updated, in seconds using the Unix timestamp format. For new API keys,
                          this value is the same as `created_at`.
                        example: 1742932766
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
      security:
        - NYLAS_API_KEY: []
        - ACCESS_TOKEN: []

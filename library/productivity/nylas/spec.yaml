    DomainObject:
      title: Domain
      type: object
      properties:
        id:
          type: string
          description: Globally unique identifier for the domain.
          example: abc-123-domain-id
        name:
          type: string
          description: A human-readable label for the domain.
          example: My transactional domain
        branded:
          type: boolean
          description: If `true`, this is a Nylas-branded `nylas.email` subdomain managed by Nylas. You can only have one free Nylas branded domain per organization and region. If `false`, this is a custom domain.
          example: false
        domain_address:
          type: string
          description: The domain address (for example, `mail.example.com`).
          example: mail.example.com
        organization_id:
          type: string
          description: The ID of the Nylas organization that owns the domain.
          example: org-123
        region:
          type: string
          description: The Nylas data center region where the domain is registered.
          enum:
            - us
            - eu
          example: us
        verified_ownership:
          type: boolean
          description: If `true`, the domain's ownership TXT record has been verified.
          example: true
        verified_dkim:
          type: boolean
          description: If `true`, the domain's DKIM TXT record has been verified.
          example: false
        verified_spf:
          type: boolean
          description: If `true`, the domain's SPF record has been verified.
          example: false
        verified_mx:
          type: boolean
          description: If `true`, the domain's MX record has been verified.
          example: false
        verified_feedback:
          type: boolean
          description: If `true`, the domain's feedback MX record for bounce detection has been verified.
          example: false
        verified_dmarc:
          type: boolean
          description: Currently not verified by Nylas. However, it is highly recommended to set DMARC to your desired value to prevent emails going to spam.
          example: false
        verified_arc:
          type: boolean
          description: Currently not verified by Nylas.
          example: false
        created_at:
          type: number
          description: When the domain was created, in seconds using the Unix timestamp format.
          example: 1742932766
        updated_at:
          type: number
          description: When the domain was last updated, in seconds using the Unix timestamp format.
          example: 1742932766
    DomainVerificationResponse:

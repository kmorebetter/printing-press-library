  /v3/grants/{grant_id}/attachment-uploads:
    post:
      summary: Create an attachment upload session
      tags:
        - Attachments
      operationId: create-attachment-upload-session
      x-beta: true
      description: |-
        Create a resumable upload session for a large attachment (up to 150 MB). Returns a pre-signed URL
        where you upload the file bytes directly using `PUT`.

        Upload sessions expire **one hour** after creation. Once you upload the file to the returned URL,
        call the [complete endpoint](/docs/reference/api/attachments/complete-attachment-upload-session/)
        to finalize the upload. After completion, reference the `attachment_id` in a send or draft request.

        **Supported providers:** Microsoft (Outlook / Exchange via Graph) only. Grants for Google, IMAP,
        Yahoo, iCloud, and EWS are rejected with a `401 Unauthorized` error.

        **Required Microsoft scopes** (at least one): `Mail.Send`, `Mail.ReadWrite`, or `Mail.ReadWrite.Shared`.

        For the full flow, prerequisites, and error handling, see
        [Send large attachments](/docs/v3/email/send-large-attachments/).
      security:
        - ACCESS_TOKEN: []
        - NYLAS_API_KEY: []
      parameters:
        - name: grant_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the grant to create the upload session for.
      requestBody:
        required: true
        description: Attachment upload session details.
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
                - content_type
              properties:
                filename:
                  type: string
                  description: The name of the file as it will appear in the email. No allowlist or sanitization is applied.
                  example: quarterly-report.pdf
                content_type:
                  type: string
                  description: The MIME type of the file (for example, `application/pdf`, `image/png`). No MIME allowlist is applied — any non-empty string is accepted and passed through to storage.
                  example: application/pdf
                size:
                  type: integer
                  format: int64
                  description: |-
                    Expected file size in bytes. Recommended — when provided, Nylas validates that the
                    uploaded object matches this size at completion. If omitted, the size-match check
                    is skipped and any non-zero upload is accepted. Maximum: `157286400` (150 MB).
                  example: 5242880
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/grants/<GRANT_ID>/attachment-uploads' \
              --header 'Content-Type: application/json' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY_OR_ACCESS_TOKEN>' \
              --data-raw '{
                "filename": "document.pdf",
                "content_type": "application/pdf",
                "size": 1048576
              }'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            async function createUploadSession() {
              try {
                const session = await nylas.attachments.createUploadSession({
                  identifier: "<NYLAS_GRANT_ID>",
                  requestBody: {
                    filename: "quarterly-report.pdf",
                    contentType: "application/pdf",
                    size: 5242880,
                  },
                });

                console.log("Upload session:", session);
              } catch (error) {
                console.error("Error creating upload session:", error);
              }
            }

            createUploadSession();
      responses:
        '201':
          description: Upload session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request ID.
                  data:
                    type: object
                    properties:
                      attachment_id:
                        type: string
                        description: Unique identifier for the upload session (UUID v4). Use this value when completing the session and when referencing the attachment in a send or draft.
                        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      method:
                        type: string
                        description: The HTTP method to use when uploading the file to `url`. Always `PUT`.
                        example: PUT
                      url:
                        type: string
                        description: Google Cloud Storage resumable upload URL. `PUT` the file bytes directly here — no Nylas authorization header is required, because this is a GCS-signed URL.
                        example: https://storage.googleapis.com/upload/storage/v1/b/BUCKET/o?uploadType=resumable&upload_id=...
                      headers:
                        type: object
                        description: Headers to include when uploading to `url`.
                        additionalProperties:
                          type: string
                        example:
                          Content-Type: application/pdf
                      expires_at:
                        type: string
                        format: date-time
                        description: When the upload session expires (RFC 3339). One hour from creation by default.
                        example: '2026-04-22T19:00:00Z'
                      max_size:
                        type: integer
                        format: int64
                        description: Maximum allowed file size in bytes.
                        example: 157286400
                      size:
                        type: integer
                        format: int64
                        description: Expected file size in bytes, echoing the request. `0` if `size` was not provided on session creation.
                        example: 5242880
                      content_type:
                        type: string
                        description: MIME type of the file.
                        example: application/pdf
                      filename:
                        type: string
                        description: Name of the file.
                        example: quarterly-report.pdf
                      grant_id:
                        type: string
                        description: The grant ID the upload session belongs to.
              example:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
                data:
                  attachment_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  method: PUT
                  url: https://storage.googleapis.com/upload/storage/v1/b/BUCKET/o?uploadType=resumable&upload_id=...
                  headers:
                    Content-Type: application/pdf
                  expires_at: '2026-04-22T19:00:00Z'
                  max_size: 157286400
                  size: 5242880
                  content_type: application/pdf
                  filename: quarterly-report.pdf
                  grant_id: abc123
        '400':
          description: |-
            Bad request. Returned when `filename` or `content_type` is missing, when `size` is
            negative or zero, when `size` exceeds the 150 MB maximum, or when the request body is not valid JSON.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: invalid_request
                      message:
                        type: string
                        example: file_size exceeds maximum allowed size of 157286400 bytes
        '401':
          description: |-
            Unauthorized. Returned when the grant cannot be resolved, the provider is not Microsoft,
            or the grant lacks the required scopes (`Mail.Send`, `Mail.ReadWrite`, or `Mail.ReadWrite.Shared`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: unauthorized
                      message:
                        type: string
                        example: unauthorized
        '500':
          description: Internal error. Returned on storage or database failures (for example, the GCS resumable upload URL could not be initiated).
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: internal_error
                      message:
                        type: string
  /v3/grants/{grant_id}/attachment-uploads/{attachment_id}/complete:
    post:
      summary: Complete an attachment upload session
      tags:
        - Attachments
      operationId: complete-attachment-upload-session
      x-beta: true
      description: |-
        Finalize an attachment upload session after the file has been uploaded to the pre-signed URL.
        Nylas verifies that the upload succeeded in storage and, if `size` was declared on session
        creation, that the uploaded byte count matches the declared size.

        After completion, reference the attachment in a [send](/docs/reference/api/messages/send-message/)
        or [draft](/docs/reference/api/drafts/put-drafts-id/) request by passing
        `{ "id": "<attachment_id>" }` in the `attachments` array.

        **Retention note:** By default, the uploaded file is deleted from storage when `expires_at`
        passes (one hour after session creation). Plan your send to occur inside this window. The
        attachment metadata row is retained for 60 days for observability.

        For the full upload flow, see
        [Send large attachments](/docs/v3/email/send-large-attachments/).
      security:
        - ACCESS_TOKEN: []
        - NYLAS_API_KEY: []
      parameters:
        - name: grant_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the grant the upload session belongs to.
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
          description: The ID of the attachment upload session to complete.
      x-code-samples:
        - lang: bash
          label: cURL
          source: |-
            curl --request POST \
              --url 'https://api.us.nylas.com/v3/grants/<GRANT_ID>/attachment-uploads/<ATTACHMENT_ID>/complete' \
              --header 'Accept: application/json' \
              --header 'Authorization: Bearer <NYLAS_API_KEY_OR_ACCESS_TOKEN>'
        - lang: javascript
          label: Node.js SDK
          source: |
            import Nylas from "nylas";

            const nylas = new Nylas({
              apiKey: "<NYLAS_API_KEY>",
              apiUri: "<NYLAS_API_URI>",
            });

            async function completeUploadSession() {
              try {
                const result = await nylas.attachments.completeUploadSession({
                  identifier: "<NYLAS_GRANT_ID>",
                  attachmentId: "<ATTACHMENT_ID>",
                });

                console.log("Completed:", result);
              } catch (error) {
                console.error("Error completing upload session:", error);
              }
            }

            completeUploadSession();
      responses:
        '200':
          description: Upload session completed successfully. The attachment is now ready to use in a send or draft.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  data:
                    type: object
                    properties:
                      attachment_id:
                        type: string
                        description: 'The attachment ID. Pass this value as `{ "id": "<attachment_id>" }` in the `attachments` array of a send or draft request.'
                        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      grant_id:
                        type: string
                      status:
                        type: string
                        description: Upload session status. Always `ready` on success.
                        enum:
                          - ready
                        example: ready
              example:
                request_id: 5fa64c92-e840-4357-86b9-2aa364d35b88
                data:
                  attachment_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  grant_id: abc123
                  status: ready
        '401':
          $ref: '#/components/responses/401'
        '404':
          description: The `attachment_id` does not exist.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: not_found
                      message:
                        type: string
        '409':
          description: 'The upload session has already been completed (`status: ready`) or has failed (`status: failed`).'
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: invalid_request
                      message:
                        type: string
                        example: upload session is already complete
        '410':
          description: |-
            The upload session has expired. Returned when the session was previously marked `expired`
            by the cleanup job, or when `expires_at` has already passed at the time `/complete` is called.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: invalid_request
                      message:
                        type: string
                        example: upload session has expired
        '422':
          description: |-
            Upload verification failed. Returned when the file is not found in storage,
            when the uploaded size does not match the `size` declared on session creation, or
            when no `size` was declared and the uploaded object is empty.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: invalid_request
                      message:
                        type: string
                        example: uploaded object not found in storage
        '500':
          description: Internal error. Returned on storage or database failures during verification.
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  error:
                    type: object
                    properties:
                      type:
                        type: string
                        example: internal_error
                      message:
                        type: string

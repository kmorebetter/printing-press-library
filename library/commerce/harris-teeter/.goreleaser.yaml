version: 2
project_name: harris-teeter-pp-cli
changelog:
  disable: true
builds:
  - id: harris-teeter-pp-cli
    main: ./cmd/harris-teeter-pp-cli
    binary: harris-teeter-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/harris-teeter/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: harris-teeter-pp-mcp
    main: ./cmd/harris-teeter-pp-mcp
    binary: harris-teeter-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: harris-teeter-pp-cli
    repository:
      owner: jonathan-moss
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Harris Teeter grocery shopping API discovered from the logged-in web app"
    install: |
      bin.install "harris-teeter-pp-cli"
      bin.install "harris-teeter-pp-mcp"
